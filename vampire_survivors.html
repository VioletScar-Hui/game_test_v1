        _bounceProjectile(proj, enemies, maxBounce) {
          let closestEnemy = null;
          let closestDist = Infinity;
          for (const e of enemies) {
            if (!e.active) continue;
            if (proj.hitEnemies && proj.hitEnemies.has(e)) continue;
            const dx = e.x - proj.x;
            const dy = e.y - proj.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < closestDist) {
              closestDist = d;
              closestEnemy = e;
            }
          }
          if (closestEnemy) {
            const dx = closestEnemy.x - proj.x;
            const dy = closestEnemy.y - proj.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d > 0) {
              const speed = Math.sqrt(proj.vx * proj.vx + proj.vy * proj.vy);
              proj.vx = (dx / d) * speed;
              proj.vy = (dy / d) * speed;
            }
            proj.bounceCount = (proj.bounceCount || 0) + 1;
            if (proj.bounceCount > maxBounce) {
              proj.active = false;
            }
          } else {
            proj.active = false;
          }
        }

        spawnBoss() {
          if (this.bossSpawned) return;
          this.bossSpawned = true;
          this.audio.startMusic('boss');
          const bossData = ENEMIES.boss;
          const enemy = new Enemy(GAME_WIDTH / 2, -50, bossData, 'boss');
          enemy.radius = 40;
          enemy.setTarget(this.player);
          this.entityManager.add(enemy);
        }

        checkVictory() {
          if (this.bossSpawned && !this.bossKilled) {
            const bosses = this.entityManager.getAll().filter(e => e.type === 'enemy' && e.enemyType === 'boss');
            if (bosses.length === 0 || !bosses.some(b => b.active)) {
              this.bossKilled = true;
              this.setState('VICTORY');
              this._startFireworks();
            }
          }
        }

        _startFireworks() {
          for (let i = 0; i < 50; i++) {
            setTimeout(() => {
              if (this.state !== 'VICTORY') return;
              const x = 100 + Math.random() * (GAME_WIDTH - 200);
              const y = 100 + Math.random() * (GAME_HEIGHT - 300);
              this._createFirework(x, y);
            }, i * 150);
          }
        }

        _createFirework(x, y) {
          const colors = ['#ff6b6b', '#ffd43b', '#69db7c', '#4dabf7', '#cc5de8', '#ff922b', '#fff'];
          const particleCount = 20 + Math.floor(Math.random() * 15);
          for (let i = 0; i < particleCount; i++) {
            const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.5;
            const speed = 1 + Math.random() * 2;
            this.fireworks.push({
              x, y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 1000 + Math.random() * 500,
              born: performance.now(),
              color: colors[Math.floor(Math.random() * colors.length)],
              size: 2 + Math.random() * 3
            });
          }
        }

        _updateFireworks(dt) {
          const now = performance.now();
          this.fireworks = this.fireworks.filter(p => now - p.born < p.life);
          for (const p of this.fireworks) {
            p.x += p.vx * dt * 0.5;
            p.y += p.vy * dt * 0.5;
            p.vy += 0.002 * dt;
          }
        }

        _renderFireworks(ctx) {
          const now = performance.now();
          for (const p of this.fireworks) {
            const elapsed = now - p.born;
            const alpha = Math.max(0, 1 - elapsed / p.life);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        showDeathQuote(x, y, text) {
          this.deathQuotes.push({ x, y, text, alpha: 1.0, life: 3000, born: performance.now() });
        }

        addDamageNumber(x, y, amount) {
          this.damageNumbers.push({ x, y, text: `-${amount}`, alpha: 1.0, life: 1000, born: performance.now(), vy: -0.08 });
        }

        addDeathExplosion(x, y, color) {
          const count = 5 + Math.floor(Math.random() * 4);
          for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.5 + Math.random() * 1.5;
            this.particles.push({
              x, y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 300,
              maxLife: 300,
              color,
              size: 3 + Math.random() * 3
            });
          }
        }

        addLevelUpAura(x, y) {
          const count = 30;
          for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count;
            const speed = 1 + Math.random() * 2;
            this.particles.push({
              x, y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 800,
              maxLife: 800,
              color: '#ffd43b',
              size: 4 + Math.random() * 4
            });
          }
        }

        addPickupTrail(x, y, color) {
          this.particles.push({
            x, y,
            vx: 0, vy: 0,
            life: 200,
            maxLife: 200,
            color,
            size: 3
          });
        }

        triggerCameraShake(intensity, duration) {
          this.cameraShake.intensity = intensity;
          this.cameraShake.duration = duration;
          this.cameraShake.timer = duration;
        }

        _updateParticles(dt) {
          this.particles = this.particles.filter(p => p.life > 0);
          for (const p of this.particles) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vx *= 0.95;
            p.vy *= 0.95;
            p.life -= dt;
          }
        }

        _renderParticles(ctx) {
          for (const p of this.particles) {
            const alpha = Math.max(0, p.life / p.maxLife);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        _updateDamageNumbers(dt) {
          const now = performance.now();
          this.damageNumbers = this.damageNumbers.filter(d => now - d.born < d.life);
          for (const d of this.damageNumbers) {
            d.y += d.vy * dt;
          }
        }

        _renderDamageNumbers(ctx) {
          const now = performance.now();
          for (const d of this.damageNumbers) {
            const elapsed = now - d.born;
            const alpha = Math.max(0, 1 - elapsed / d.life);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 16px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(d.text, d.x, d.y);
            ctx.restore();
          }
        }

        _updateCameraShake(dt) {
          if (this.cameraShake.timer > 0) {
            this.cameraShake.timer -= dt;
            const progress = this.cameraShake.timer / this.cameraShake.duration;
            const currentIntensity = this.cameraShake.intensity * progress;
            this.cameraShake.x = (Math.random() - 0.5) * 2 * currentIntensity;
            this.cameraShake.y = (Math.random() - 0.5) * 2 * currentIntensity;
          } else {
            this.cameraShake.x = 0;
            this.cameraShake.y = 0;
          }
        }

        _renderDamageVignette(ctx) {
          const hpRatio = this.player.hp / this.player.maxHp;
          if (hpRatio > 0.3) return;
          const alpha = (0.3 - hpRatio) / 0.3 * 0.6;
          const gradient = ctx.createRadialGradient(GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH * 0.3, GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH * 0.8);
          gradient.addColorStop(0, 'rgba(255, 0, 0, 0)');
          gradient.addColorStop(1, `rgba(180, 0, 0, ${alpha})`);
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        }

        _applyDrop(dropData) {
          const player = this.player;
          switch (dropData.type) {
            case 'exp':
              player.addExp(dropData.value);
              this.audio.playExpPickup();
              break;
            case 'gold':
              player.gold += dropData.value;
              this.audio.playExpPickup();
              break;
            case 'heal':
              player.hp = Math.min(player.maxHp, player.hp + player.maxHp * dropData.value);
              break;
            case 'chest':
              player.addExp(50);
              this.audio.playExpPickup();
              break;
            case 'rare':
              player.gold += 50;
              this.audio.playExpPickup();
              break;
          }
        }

        _initMenuButtons() {
          const bw = 280;
          const bh = 56;
          const bx = (GAME_WIDTH - bw) / 2;
          const startY = GAME_HEIGHT / 2 + 20;
          const gap = 24;

          this.menuButtons = [
            new MenuButton('继续游戏', bx, startY, bw, bh, () => {
              if (this._hasAnySave()) {
                this.setState('SAVE_SELECT');
              }
            }, () => !this._hasAnySave()),
            new MenuButton('开始游戏', bx, startY + bh + gap, bw, bh, () => {
              this.setState('LEVEL_SELECT');
            }),
            new MenuButton('设置', bx, startY + (bh + gap) * 2, bw, bh, () => {
              this.setState('SETTINGS');
            }),
            new MenuButton('退出游戏', bx, startY + (bh + gap) * 3, bw, bh, () => {
              if (window.history.length > 1) {
                window.history.back();
              } else {
                window.close();
              }
            })
          ];
          this.saveSelectSlotBounds = [];
          this.saveSelectBackHovered = false;
          this.saveSelectDeleteHovered = -1;
          this.selectedCharacterIndex = -1;
          this.characterSelectButtons = [];
          this.confirmButtonHovered = false;
          this.selectedLevelIndex = -1;
          this.levelSelectButtons = [];
          this.levelBackButtonHovered = false;
          this.pauseMenuButtons = [];
          this._initPauseMenuButtons();
        }

        _initPauseMenuButtons() {
          const bw = 280;
          const bh = 56;
          const bx = (GAME_WIDTH - bw) / 2;
          const startY = GAME_HEIGHT / 2 - 80;
          const gap = 16;
          this.pauseMenuButtons = [
            new MenuButton('继续游戏', bx, startY, bw, bh, () => {
              this.setState('PLAYING');
            }),
            new MenuButton('保存并返回', bx, startY + bh + gap, bw, bh, () => {
              this._showSaveSlotSelect = true;
            }),
            new MenuButton('设置', bx, startY + (bh + gap) * 2, bw, bh, () => {
              this.setState('SETTINGS');
            }),
            new MenuButton('返回主菜单', bx, startY + (bh + gap) * 3, bw, bh, () => {
              this.setState('MENU');
            }),
            new MenuButton('退出游戏', bx, startY + (bh + gap) * 4, bw, bh, () => {
              if (window.history.length > 1) {
                window.history.back();
              } else {
                window.close();
              }
            })
          ];
          this._showSaveSlotSelect = false;
          this._pauseSaveSlotBounds = [];
          this._pauseSaveSlotHovered = -1;
        }

        spawnEnemy(type, x, y) {
          const enemy = new Entity(x, y, 15);
          enemy.type = type || 'enemy';
          enemy.fillStyle = '#ff6b6b';
          enemy.render = function (ctx) {
            ctx.save();
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius + 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fill();
            ctx.restore();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.fillStyle;
            ctx.fill();
          };
          this.entityManager.add(enemy);
          return enemy;
        }

        setState(newState) {
          if (this.state !== 'SETTINGS') {
            this.previousState = this.state;
          }
          this.state = newState;
          if (newState === 'MENU') {
            this.audio.startMusic('menu');
          } else if (newState === 'PLAYING') {
            if (this.bossSpawned && !this.bossKilled) {
              this.audio.startMusic('boss');
            } else {
              this.audio.startMusic('game');
            }
          } else if (newState === 'GAME_OVER' || newState === 'VICTORY') {
            this.audio.stopMusic();
          } else if (newState === 'PAUSED') {
            this.audio.stopMusic();
          } else if (newState === 'SHOP') {
            this.audio.stopMusic();
          } else if (newState === 'LEVEL_SELECT' || newState === 'CHARACTER_SELECT' || newState === 'SAVE_SELECT') {
            this.audio.startMusic('menu');
          }
          if (newState === 'MENU') {
            this.selectedLevelIndex = -1;
            this.selectedCharacterIndex = -1;
            this.levelSelectButtons = [];
            this.characterSelectButtons = [];
            this.waveTimer = 0;
            this.waveNumber = 0;
            this.spawnTimers = {};
            this.bossSpawned = false;
            this.bossKilled = false;
            this.gameTime = 0;
            this.score = 0;
            this.difficultyMultiplier = 1.0;
            this.difficultyNotifTimer = 0;
            this.arcanaTimer = 0;
            this.arcanaFirstChoice = true;
            this.arcanaSelectCount = 0;
            this.arcanaSelectPending = false;
            this.arcanaCardBounds = null;
            this.arcanaHoveredIndex = -1;
            this.fireworks = [];
            this.deathQuotes = [];
            this.particles = [];
            this.damageNumbers = [];
            this.cameraShake = { x: 0, y: 0, intensity: 0, duration: 0, timer: 0 };
            this.lastLevel = 1;
            this.entityManager.clear();
            this.player = new Player(GAME_WIDTH / 2, GAME_HEIGHT / 2);
            this.entityManager.add(this.player);
          }
          if (newState === 'PLAYING') {
            if (this.previousState === 'SHOP' || this.previousState === 'PAUSED') {
              this.cameraGesture.start();
            } else {
              this.waveTimer = 0;
              this.waveNumber = 1;
              this.spawnTimers = {};
              this.bossSpawned = false;
              this.bossKilled = false;
              this.gameTime = 0;
              this.score = 0;
              this.difficultyMultiplier = 1.0;
              this.difficultyNotifTimer = 0;
              this.arcanaTimer = 0;
              this.arcanaFirstChoice = true;
              this.arcanaSelectCount = 0;
              this.arcanaSelectPending = false;
              this.arcanaCardBounds = null;
              this.arcanaHoveredIndex = -1;
              this.fireworks = [];
              this.deathQuotes = [];
              this.particles = [];
              this.damageNumbers = [];
              this.cameraShake = { x: 0, y: 0, intensity: 0, duration: 0, timer: 0 };
              this.lastLevel = 1;
              this._showSaveSlotSelect = false;
              this._pauseSaveSlotHovered = -1;
              this.player.x = GAME_WIDTH / 2;
              this.player.y = GAME_HEIGHT / 2;
              this.player.hp = this.player.maxHp;
              this.player.active = true;
              this.player.exp = 0;
              this.player.gold = 0;
              this.player.kills = 0;
              this.player.level = 1;
              this.player.attackBonus = 0;
              this.player.invincibleTimer = 0;
              this.player.baseAttack = 20;
              const playChar = CHARACTERS[this.selectedCharacterIndex];
              if (playChar) {
                this.player.applyCharacterStats(playChar);
              }
              if (this.player.weapon) {
                this.player.weapon.damage = this.player.getAttack();
              }
              this.cameraGesture.start();
            }
          }
        }

        _initCharacterSelectButtons() {
          const cardW = 320;
          const cardH = 420;
          const gap = 32;
          const totalW = CHARACTERS.length * cardW + (CHARACTERS.length - 1) * gap;
          const startX = (GAME_WIDTH - totalW) / 2;
          const cardY = GAME_HEIGHT / 2 - cardH / 2 + 30;

          this.characterSelectButtons = CHARACTERS.map((char, i) => ({
            x: startX + i * (cardW + gap),
            y: cardY,
            w: cardW,
            h: cardH,
            character: char,
            hovered: false
          }));
        }

        update(dt) {
          if (this.intro.active) {
            this.intro.update(dt);
            if (this.intro.finished) {
              this.setState('MENU');
            }
            return;
          }
          if (this.loading.active) {
            this.loading.update(dt);
            return;
          }
          if (this.state === 'MENU') {
            this.menuButtons.forEach(b => b.update(dt));
            return;
          }
          if (this.state === 'LEVEL_SELECT') {
            return;
          }
          if (this.state === 'CHARACTER_SELECT') {
            return;
          }
          if (this.state === 'PAUSED') {
            this.pauseMenuButtons.forEach(b => b.update(dt));
            return;
          }
          if (this.state === 'SHOP') {
            return;
          }
          if (this.state === 'GAME_OVER') {
            return;
          }
          if (this.state === 'VICTORY') {
            return;
          }
          if (this.state === 'ARCANA_SELECT') {
            return;
          }
          if (this.state !== 'PLAYING') return;

          if (this.inputManager.keys['Space'] && this.player.active) {
            this.inputManager.keys['Space'] = false;
            this.player.startDash();
          }

          if (this.inputManager.consumeSwipe() && this.player.active) {
            const fired = this.player.burstSkill.fire(this.player, this.entityManager);
            if (fired) {
              this.audio.playShoot();
              this.addLevelUpAura(this.player.x, this.player.y);
            }
          }

          this.cameraGesture.update(dt);
          if (this.cameraGesture.active && this.cameraGesture.consumeSwipe() && this.player.active) {
            const fired = this.player.burstSkill.fire(this.player, this.entityManager);
            if (fired) {
              this.audio.playShoot();
              this.addLevelUpAura(this.player.x, this.player.y);
            }
          }

          this.gameTime += dt;
          this.waveTimer += dt;

          if (this.arcanaFirstChoice && this.player.active && this.arcanaSelectCount < 5) {
            this.arcanaFirstChoice = false;
            this.arcanaSelectPending = true;
          }

          this.arcanaTimer += dt;
          if (this.arcanaTimer >= 60000 && this.player.arcanaInventory.canSelect() && this.player.active && this.arcanaSelectCount < 5) {
            this.arcanaTimer -= 60000;
            this.arcanaSelectPending = true;
          }

          if (this.arcanaSelectPending && this.player.arcanaInventory.canSelect()) {
            this.arcanaSelectPending = false;
            this.previousState = this.state;
            this.state = 'ARCANA_SELECT';
            return;
          }

          if (this.waveTimer >= 60000) {
            this.waveTimer -= 60000;
            this.waveNumber++;
            this.difficultyMultiplier *= 1.1;
            this.difficultyNotifTimer = 3000;
          }

          if (this.difficultyNotifTimer > 0) {
            this.difficultyNotifTimer -= dt;
          }

          this._spawnEnemies(dt);

          this.entityManager.getAll().forEach(e => {
            if (e.type === 'enemy') e.setTarget(this.player);
            if (e.type === 'drop') {
              const prevX = e.x;
              const prevY = e.y;
              const dropData = e.update(dt, this.player);
              if (dropData) {
                this._applyDrop(dropData);
              } else if (e.picked) {
                // Add pickup trail when magnet activated
                for (let i = 0; i < 3; i++) {
                  const t = i / 3;
                  const tx = prevX + (e.x - prevX) * t;
                  const ty = prevY + (e.y - prevY) * t;
                  this.addPickupTrail(tx, ty, e.dropData.color);
                }
              }
            } else if (e.type === 'whip_slash') {
              e.update(dt, this.entityManager);
            } else {
              e.update(dt);
            }
          });

          const projectiles = this.entityManager.getAll().filter(e => e.type === 'projectile');
          const enemies = this.entityManager.getAll().filter(e => e.type === 'enemy');
          const foolCount = this.player.arcanaInventory.getCount('fool');
          for (const proj of projectiles) {
            for (const enemy of enemies) {
              if (!enemy.active || !proj.active) continue;
              if (proj.hitEnemies && proj.hitEnemies.has(enemy)) continue;
              const dx = proj.x - enemy.x;
              const dy = proj.y - enemy.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < proj.radius + enemy.radius) {
                enemy.takeDamage(proj.damage);
                this.audio.playHit();
                if (proj.hitEnemies) {
                  proj.hitEnemies.add(enemy);
                  if (proj.pierceLeft !== undefined) {
                    proj.pierceLeft--;
                    if (proj.pierceLeft < 0) {
                      if (foolCount > 0) {
                        this._bounceProjectile(proj, enemies, foolCount * 3);
                      } else {
                        proj.active = false;
                      }
                    }
                  } else if (foolCount > 0) {
                    this._bounceProjectile(proj, enemies, foolCount * 3);
                  } else {
                    proj.active = false;
                  }
                } else if (foolCount > 0) {
                  this._bounceProjectile(proj, enemies, foolCount * 3);
                } else {
                  proj.active = false;
                }
                break;
              }
            }
          }

          for (const enemy of enemies) {
            if (!enemy.active || !this.player.active) continue;
            const dx = this.player.x - enemy.x;
            const dy = this.player.y - enemy.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < this.player.radius + enemy.radius) {
              if (this.player.invincibleTimer > 0) continue;
              this.player.hp -= enemy.atk;
              this.player.invincibleTimer = 500;
              this.triggerCameraShake(5, 200);
              this.audio.playDamage();
              if (this.player.hp <= 0) {
                this.player.hp = 0;
                this.player.active = false;
                const isNewRecord = this.gameTime > this.bestTime;
                if (isNewRecord) {
                  this.bestTime = this.gameTime;
                  this._saveBestTime(this.gameTime);
                }
                if (this.score > this.bestScore) {
                  this.bestScore = this.score;
                  this._saveBestScore(this.score);
                }
                this.setState('GAME_OVER');
                break;
              }
            }
          }

          this.entityManager.clearInactive();
          this.checkVictory();
          this.camera.follow(this.player);
          this._updateParticles(dt);
          this._updateDamageNumbers(dt);
          this._updateCameraShake(dt);

          // Level up check
          const currentLevel = this.player.getLevel();
          if (currentLevel > this.lastLevel) {
            this.lastLevel = currentLevel;
            this.addLevelUpAura(this.player.x, this.player.y);
            this.audio.playLevelUp();
          }
        }

        _spawnEnemies(dt) {
          const levelId = LEVELS[this.selectedLevelIndex] ? LEVELS[this.selectedLevelIndex].id : LEVELS[0].id;

          const commonPool = ENEMIES.common.filter(e => e.level === levelId);
          const elitePool = ENEMIES.elite.filter(e => e.level === levelId);

          for (const data of commonPool) {
            if (!this.spawnTimers[data.id]) this.spawnTimers[data.id] = 0;
            this.spawnTimers[data.id] += dt;
            const interval = Math.max(200, (data.spawnInterval - (this.waveNumber - 1) * 100) / this.difficultyMultiplier);
            if (this.spawnTimers[data.id] >= interval) {
              this.spawnTimers[data.id] -= interval;
              const count = data.spawnCount[0] + Math.floor(Math.random() * (data.spawnCount[1] - data.spawnCount[0] + 1));
              for (let i = 0; i < count; i++) {
                const side = Math.floor(Math.random() * 4);
                let ex, ey;
                switch (side) {
                  case 0: ex = Math.random() * GAME_WIDTH; ey = -20; break;
                  case 1: ex = GAME_WIDTH + 20; ey = Math.random() * GAME_HEIGHT; break;
                  case 2: ex = Math.random() * GAME_WIDTH; ey = GAME_HEIGHT + 20; break;
                  case 3: ex = -20; ey = Math.random() * GAME_HEIGHT; break;
                }
                const enemy = new Enemy(ex, ey, data, 'common');
                enemy.setTarget(this.player);
                this.entityManager.add(enemy);
                this.unlockBestiaryEnemy(data.id);
              }
            }
          }

          for (const data of elitePool) {
            if (!this.spawnTimers[data.id]) this.spawnTimers[data.id] = 0;
            this.spawnTimers[data.id] += dt;
            const interval = Math.max(15000, (data.spawnInterval - (this.waveNumber - 1) * 5000) / this.difficultyMultiplier);
            if (this.spawnTimers[data.id] >= interval) {
              this.spawnTimers[data.id] -= interval;
              const side = Math.floor(Math.random() * 4);
              let ex, ey;
              switch (side) {
                case 0: ex = Math.random() * GAME_WIDTH; ey = -30; break;
                case 1: ex = GAME_WIDTH + 30; ey = Math.random() * GAME_HEIGHT; break;
                case 2: ex = Math.random() * GAME_WIDTH; ey = GAME_HEIGHT + 30; break;
                case 3: ex = -30; ey = Math.random() * GAME_HEIGHT; break;
              }
              const enemy = new Enemy(ex, ey, data, 'elite');
              enemy.radius = 18;
              enemy.setTarget(this.player);
              this.entityManager.add(enemy);
              this.unlockBestiaryEnemy(data.id);
            }
          }

          if (!this.bossSpawned && this.gameTime >= 1800000) {
            this.bossSpawned = true;
            this.audio.startMusic('boss');
            const bossData = ENEMIES.boss;
            const enemy = new Enemy(GAME_WIDTH / 2, -50, bossData, 'boss');
            enemy.radius = 40;
            enemy.setTarget(this.player);
            this.entityManager.add(enemy);
            this.unlockBestiaryEnemy(bossData.id);
          }
        }

        render(ctx) {
          ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

          if (this.intro.active) {
            ctx.fillStyle = '#050510';

              const ir = 8;
              ctx.beginPath();
              ctx.moveTo(ix + ir, iy);
              ctx.lineTo(ix + itemW - ir, iy);
              ctx.quadraticCurveTo(ix + itemW, iy, ix + itemW, iy + ir);
              ctx.lineTo(ix + itemW, iy + itemH - ir);
              ctx.quadraticCurveTo(ix + itemW, iy + itemH, ix + itemW - ir, iy + itemH);
              ctx.lineTo(ix + ir, iy + itemH);
              ctx.quadraticCurveTo(ix, iy + itemH, ix, iy + itemH - ir);
              ctx.lineTo(ix, iy + ir);

              ctx.font = '24px sans-serif';

              ctx.fillText(item.desc, ix + 48, iy + 44);

              const buyBtnW = 70;
              const buyBtnH = 30;
              const buyBtnX = ix + itemW - buyBtnW - 8;
              const buyBtnY = iy + (itemH - buyBtnH) / 2;
              const buyHovered = this._shopBuyHoveredIndex === i;

              ctx.fillStyle = item.canBuy ? (buyHovered ? 'rgba(255, 212, 59, 0.3)' : 'rgba(255, 212, 59, 0.15)') : 'rgba(100, 100, 100, 0.2)';
              ctx.strokeStyle = item.canBuy ? (buyHovered ? '#ffd43b' : 'rgba(255, 212, 59, 0.5)') : 'rgba(100, 100, 100, 0.3)';
              ctx.lineWidth = buyHovered ? 2 : 1;
              const br = 6;
              ctx.beginPath();
              ctx.moveTo(buyBtnX + br, buyBtnY);
              ctx.lineTo(buyBtnX + buyBtnW - br, buyBtnY);
              ctx.quadraticCurveTo(buyBtnX + buyBtnW, buyBtnY, buyBtnX + buyBtnW, buyBtnY + br);
              ctx.lineTo(buyBtnX + buyBtnW, buyBtnY + buyBtnH - br);
              ctx.quadraticCurveTo(buyBtnX + buyBtnW, buyBtnY + buyBtnH, buyBtnX + buyBtnW - br, buyBtnY + buyBtnH);
              ctx.lineTo(buyBtnX + br, buyBtnY + buyBtnH);
              ctx.quadraticCurveTo(buyBtnX, buyBtnY + buyBtnH, buyBtnX, buyBtnY + buyBtnH - br);
              ctx.lineTo(buyBtnX, buyBtnY + br);
              ctx.quadraticCurveTo(buyBtnX, buyBtnY, buyBtnX + br, buyBtnY);
              ctx.closePath();
              ctx.fill();
              ctx.stroke();

              ctx.fillStyle = item.canBuy ? '#ffd43b' : '#666';
              ctx.font = 'bold 13px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(`${item.cost}G`, buyBtnX + buyBtnW / 2, buyBtnY + buyBtnH / 2);
            }

            const closeBtnW = 140;
            const closeBtnH = 40;
            const closeBtnX = panelX + shopAreaW / 2;
            const closeBtnY = panelY + panelH - 50;
            const closeHovered = this._shopCloseHovered;

            ctx.fillStyle = closeHovered ? 'rgba(255, 255, 255, 0.15)' : 'rgba(255, 255, 255, 0.05)';
            ctx.strokeStyle = closeHovered ? '#fff' : 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = closeHovered ? 2 : 1;
            const cr = 8;
            ctx.beginPath();
            ctx.moveTo(closeBtnX - closeBtnW / 2 + cr, closeBtnY);
            ctx.lineTo(closeBtnX + closeBtnW / 2 - cr, closeBtnY);
            ctx.quadraticCurveTo(closeBtnX + closeBtnW / 2, closeBtnY, closeBtnX + closeBtnW / 2, closeBtnY + cr);
            ctx.lineTo(closeBtnX + closeBtnW / 2, closeBtnY + closeBtnH - cr);
            ctx.quadraticCurveTo(closeBtnX + closeBtnW / 2, closeBtnY + closeBtnH, closeBtnX + closeBtnW / 2 - cr, closeBtnY + closeBtnH);
            ctx.lineTo(closeBtnX - closeBtnW / 2 + cr, closeBtnY + closeBtnH);
            ctx.quadraticCurveTo(closeBtnX - closeBtnW / 2, closeBtnY + closeBtnH, closeBtnX - closeBtnW / 2, closeBtnY + closeBtnH - cr);
            ctx.lineTo(closeBtnX - closeBtnW / 2, closeBtnY + cr);
            ctx.quadraticCurveTo(closeBtnX - closeBtnW / 2, closeBtnY, closeBtnX - closeBtnW / 2 + cr, closeBtnY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('关闭', closeBtnX, closeBtnY + closeBtnH / 2);
          }

          if (this.state === 'GAME_OVER') {
            const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            gradient.addColorStop(0, 'rgba(80, 0, 0, 0.85)');
            gradient.addColorStop(1, 'rgba(30, 0, 0, 0.95)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 72px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0,0,0,0.9)';
            ctx.shadowBlur = 20;
            ctx.fillText('YOU WASTED', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 120);
            ctx.shadowBlur = 0;

            const totalSeconds = Math.floor(this.gameTime / 1000);
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            const level = this.player.getLevel();

            ctx.fillStyle = '#fff';
            ctx.font = '22px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`存活时间: ${minutes}:${seconds}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40);
            ctx.fillText(`击杀数: ${this.player.kills}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 10);
            ctx.fillText(`达到等级: Lv. ${level}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20);
            ctx.fillText(`分数: ${this.score}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 45);

            const isNewScore = this.score > this.bestScore && this.score > 0;
            if (isNewScore) {
              this.bestScore = this.score;
              this._saveBestScore(this.score);
            }

            const bestTotalSeconds = Math.floor(this.bestTime / 1000);
            const bestMin = Math.floor(bestTotalSeconds / 60).toString().padStart(2, '0');
            const bestSec = (bestTotalSeconds % 60).toString().padStart(2, '0');
            ctx.fillStyle = '#ffd43b';
            ctx.font = '16px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.fillText(`最佳记录: ${bestMin}:${bestSec}  最高分数: ${this.bestScore}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 70);

            if ((this.gameTime >= this.bestTime && this.gameTime > 0) || isNewScore) {
              ctx.fillStyle = '#ffd43b';
              ctx.font = 'bold 28px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
              ctx.shadowBlur = 15;
              ctx.fillText('NEW RECORD!', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 100);
              ctx.shadowBlur = 0;

              { x: btnX, y: btnStartY, w: btnW, h: btnH, text: '再试一次', action: 'retry' },

            ];
            for (const btn of overBtns) {
              const hov = this.gameOverBtnHovered === btn.action;
              ctx.fillStyle = hov ? 'rgba(255, 255, 255, 0.15)' : 'rgba(255, 255, 255, 0.08)';
              ctx.strokeStyle = hov ? '#ffd43b' : 'rgba(255, 255, 255, 0.4)';
              ctx.lineWidth = hov ? 3 : 2;
              const rr = 8;
              ctx.beginPath();
              ctx.moveTo(btn.x + rr, btn.y);
              ctx.lineTo(btn.x + btn.w - rr, btn.y);
              ctx.quadraticCurveTo(btn.x + btn.w, btn.y, btn.x + btn.w, btn.y + rr);
              ctx.lineTo(btn.x + btn.w, btn.y + btn.h - rr);
              ctx.quadraticCurveTo(btn.x + btn.w, btn.y + btn.h, btn.x + btn.w - rr, btn.y + btn.h);
              ctx.lineTo(btn.x + rr, btn.y + btn.h);
              ctx.quadraticCurveTo(btn.x, btn.y + btn.h, btn.x, btn.y + btn.h - rr);
              ctx.lineTo(btn.x, btn.y + rr);
              ctx.quadraticCurveTo(btn.x, btn.y, btn.x + rr, btn.y);
              ctx.closePath();
              ctx.fill();
              ctx.stroke();
              ctx.fillStyle = hov ? '#ffd43b' : '#e8e8e8';
              ctx.font = `${hov ? 'bold' : 'normal'} 24px "Segoe UI", "Microsoft YaHei", sans-serif`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(btn.text, btn.x + btn.w / 2, btn.y + btn.h / 2);
            }
          }

          if (this.state === 'VICTORY') {
            this._renderFireworks(ctx);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.fillStyle = '#ffd43b';
            ctx.font = 'bold 80px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0,0,0,0.9)';
            ctx.shadowBlur = 24;
            ctx.fillText('Victory', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 80);
            ctx.shadowBlur = 0;

            const totalSeconds = Math.floor(this.gameTime / 1000);
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            const level = this.player.getLevel();

            ctx.fillStyle = '#fff';
            ctx.font = '22px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.fillText(`存活时间: ${minutes}:${seconds}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 30);
            ctx.fillText(`击杀数: ${this.player.kills}`, GAME_WIDTH / 2, GAME_HEIGHT / 2);
            ctx.fillText(`达到等级: Lv. ${level}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30);

            if (isNewScore) {
              ctx.fillStyle = '#ffd43b';

              ctx.shadowBlur = 15;
              ctx.fillText('NEW RECORD!', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 120);
              ctx.shadowBlur = 0;

            ctx.fillStyle = '#ccc';
            ctx.font = '20px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.fillText('按Esc返回主菜单', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 160);
