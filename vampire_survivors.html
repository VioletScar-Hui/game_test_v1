        _drawCoverImage(ctx, img) {
          if (!img || !img.complete || img.naturalWidth <= 0) return false;
          const imgRatio = img.naturalWidth / img.naturalHeight;
          const canvasRatio = GAME_WIDTH / GAME_HEIGHT;
          let sx, sy, sWidth, sHeight;
          if (imgRatio > canvasRatio) {
            sHeight = img.naturalHeight;
            sWidth = sHeight * canvasRatio;
            sx = (img.naturalWidth - sWidth) / 2;
            sy = 0;
          } else {
            sWidth = img.naturalWidth;
            sHeight = sWidth / canvasRatio;
            sx = 0;
            sy = (img.naturalHeight - sHeight) / 2;
          }
          ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, GAME_WIDTH, GAME_HEIGHT);
          return true;
        }

        _renderCharacterSelect(ctx) {
          const selectedChar = CHARACTERS[this.selectedCharacterIndex];
          const bgImg = selectedChar ? CHARACTER_BG_IMAGES[selectedChar.id] : null;

          if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
            this._drawCoverImage(ctx, bgImg);
          } else {
            ctx.fillStyle = '#0a0a14';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
          }

          ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
          ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

          ctx.fillStyle = '#fff';
          ctx.font = 'bold 40px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = 10;
          ctx.fillText('选择你的 Spicy', GAME_WIDTH / 2, 80);
          ctx.shadowBlur = 0;

          ctx.fillStyle = '#bbb';
          ctx.font = '16px sans-serif';
          ctx.fillText('点击角色卡片预览，确认后点击继续', GAME_WIDTH / 2, 115);

          if (this.characterSelectButtons.length === 0) {
            this._initCharacterSelectButtons();
          }

          for (let i = 0; i < this.characterSelectButtons.length; i++) {
            const btn = this.characterSelectButtons[i];
            const char = btn.character;
            const isSelected = this.selectedCharacterIndex === i;
            const isHovered = btn.hovered;

            const glow = isSelected ? 20 : (isHovered ? 12 : 0);
            if (glow > 0) {
              ctx.shadowColor = isSelected ? '#ffd43b' : 'rgba(255, 255, 255, 0.3)';
              ctx.shadowBlur = glow;
            }

            ctx.fillStyle = isSelected ? 'rgba(255, 212, 59, 0.12)' : 'rgba(255, 255, 255, 0.06)';
            ctx.strokeStyle = isSelected ? '#ffd43b' : (isHovered ? 'rgba(255, 255, 255, 0.5)' : 'rgba(255, 255, 255, 0.15)');
            ctx.lineWidth = isSelected ? 3 : 2;

            const r = 12;
            ctx.beginPath();
            ctx.moveTo(btn.x + r, btn.y);
            ctx.lineTo(btn.x + btn.w - r, btn.y);
            ctx.quadraticCurveTo(btn.x + btn.w, btn.y, btn.x + btn.w, btn.y + r);
            ctx.lineTo(btn.x + btn.w, btn.y + btn.h - r);
            ctx.quadraticCurveTo(btn.x + btn.w, btn.y + btn.h, btn.x + btn.w - r, btn.y + btn.h);
            ctx.lineTo(btn.x + r, btn.y + btn.h);
            ctx.quadraticCurveTo(btn.x, btn.y + btn.h, btn.x, btn.y + btn.h - r);
            ctx.lineTo(btn.x, btn.y + r);
            ctx.quadraticCurveTo(btn.x, btn.y, btn.x + r, btn.y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.shadowBlur = 0;

            const cx = btn.x + btn.w / 2;
            let cy = btn.y + 40;

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 22px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(char.name, cx, cy);

            cy += 28;
            ctx.fillStyle = '#aaa';
            ctx.font = '14px sans-serif';
            ctx.fillText(char.title, cx, cy);

            cy += 50;
            ctx.fillStyle = '#ddd';
            ctx.font = '15px "Segoe UI", "Microsoft YaHei", sans-serif';
            const words = char.lore.split('');
            let line = '';
            const maxWidth = btn.w - 40;
            const lineHeight = 22;
            for (let n = 0; n < words.length; n++) {
              const testLine = line + words[n];
              const metrics = ctx.measureText(testLine);
              if (metrics.width > maxWidth && n > 0) {
                ctx.fillText(line, cx, cy);
                line = words[n];
                cy += lineHeight;
              } else {
                line = testLine;
              }
            }
            ctx.fillText(line, cx, cy);

            cy += 50;
            ctx.fillStyle = '#ffd43b';
            ctx.font = 'bold 15px sans-serif';
            const startWDef = char.startWeaponId ? WEAPON_DEFS[char.startWeaponId] : null;
            ctx.fillText(`武器: ${char.weapon}${startWDef ? ` (${startWDef.name})` : ''}`, cx, cy);

            cy += 28;
            ctx.fillStyle = '#74c0fc';
            ctx.font = '14px sans-serif';
            ctx.fillText(`被动: ${char.passive.description}`, cx, cy);
          }

          const backBtn = { x: 40, y: GAME_HEIGHT - 70, w: 120, h: 44 };
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.strokeStyle = 'rgba(255,255,255,0.3)';
          ctx.lineWidth = 2;
          const br = 6;
          ctx.beginPath();
          ctx.moveTo(backBtn.x + br, backBtn.y);
          ctx.lineTo(backBtn.x + backBtn.w - br, backBtn.y);
          ctx.quadraticCurveTo(backBtn.x + backBtn.w, backBtn.y, backBtn.x + backBtn.w, backBtn.y + br);
          ctx.lineTo(backBtn.x + backBtn.w, backBtn.y + backBtn.h - br);
          ctx.quadraticCurveTo(backBtn.x + backBtn.w, backBtn.y + backBtn.h, backBtn.x + backBtn.w - br, backBtn.y + backBtn.h);
          ctx.lineTo(backBtn.x + br, backBtn.y + backBtn.h);
          ctx.quadraticCurveTo(backBtn.x, backBtn.y + backBtn.h, backBtn.x, backBtn.y + backBtn.h - br);
          ctx.lineTo(backBtn.x, backBtn.y + br);
          ctx.quadraticCurveTo(backBtn.x, backBtn.y, backBtn.x + br, backBtn.y);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = '#ccc';
          ctx.font = '16px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('← 返回', backBtn.x + backBtn.w / 2, backBtn.y + backBtn.h / 2);

          if (selectedChar) {
            const confirmW = 200;
            const confirmH = 52;
            const confirmX = (GAME_WIDTH - confirmW) / 2;
            const confirmY = GAME_HEIGHT - 90;
            const hovered = this.confirmButtonHovered;

            ctx.shadowColor = '#ffd43b';
            ctx.shadowBlur = hovered ? 20 : 10;
            ctx.fillStyle = hovered ? 'rgba(255, 212, 59, 0.2)' : 'rgba(255, 212, 59, 0.1)';
            ctx.strokeStyle = '#ffd43b';
            ctx.lineWidth = hovered ? 3 : 2;

            const cr = 10;
            ctx.beginPath();
            ctx.moveTo(confirmX + cr, confirmY);
            ctx.lineTo(confirmX + confirmW - cr, confirmY);
            ctx.quadraticCurveTo(confirmX + confirmW, confirmY, confirmX + confirmW, confirmY + cr);
            ctx.lineTo(confirmX + confirmW, confirmY + confirmH - cr);
            ctx.quadraticCurveTo(confirmX + confirmW, confirmY + confirmH, confirmX + confirmW - cr, confirmY + confirmH);
            ctx.lineTo(confirmX + cr, confirmY + confirmH);
            ctx.quadraticCurveTo(confirmX, confirmY + confirmH, confirmX, confirmY + confirmH - cr);
            ctx.lineTo(confirmX, confirmY + cr);
            ctx.quadraticCurveTo(confirmX, confirmY, confirmX + cr, confirmY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffd43b';
            ctx.font = `${hovered ? 'bold' : 'normal'} 22px "Segoe UI", "Microsoft YaHei", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('继续 ▶', confirmX + confirmW / 2, confirmY + confirmH / 2);
          }
        }

        _renderSaveSelect(ctx) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
          ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

          ctx.fillStyle = '#ffd43b';
          ctx.font = 'bold 36px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
          ctx.shadowColor = '#ffd43b';
          ctx.shadowBlur = 15;
          ctx.fillText('选择存档', GAME_WIDTH / 2, 80);
          ctx.shadowBlur = 0;

          const saves = this._getAllSaves();
          const slotW = 320;
          const slotH = 200;
          const gap = 30;
          const totalW = 3 * slotW + 2 * gap;
          const startX = (GAME_WIDTH - totalW) / 2;
          const startY = 120;

          this.saveSelectSlotBounds = [];

          for (let i = 0; i < 3; i++) {
            const sx = startX + i * (slotW + gap);
            const sy = startY;
            const save = saves[i];
            const hovered = this.saveSelectSlotBounds.length > i ? false : false;

            this.saveSelectSlotBounds.push({ x: sx, y: sy, w: slotW, h: slotH, slot: i });

            ctx.save();
            const cr = 12;
            ctx.beginPath();
            ctx.moveTo(sx + cr, sy);
            ctx.lineTo(sx + slotW - cr, sy);
            ctx.quadraticCurveTo(sx + slotW, sy, sx + slotW, sy + cr);
            ctx.lineTo(sx + slotW, sy + slotH - cr);
            ctx.quadraticCurveTo(sx + slotW, sy + slotH, sx + slotW - cr, sy + slotH);
            ctx.lineTo(sx + cr, sy + slotH);
            ctx.quadraticCurveTo(sx, sy + slotH, sx, sy + slotH - cr);
            ctx.lineTo(sx, sy + cr);
            ctx.quadraticCurveTo(sx, sy, sx + cr, sy);
            ctx.closePath();

            if (save) {
              ctx.fillStyle = 'rgba(20, 30, 50, 0.95)';
              ctx.strokeStyle = '#ffd43b';
              ctx.lineWidth = 2;
            } else {
              ctx.fillStyle = 'rgba(15, 15, 25, 0.9)';
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
              ctx.lineWidth = 1;
            }
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            ctx.textAlign = 'center';
            ctx.textBaseline = 'alphabetic';

            ctx.fillStyle = '#ffd43b';
            ctx.font = 'bold 20px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.fillText(`存档 ${i + 1}`, sx + slotW / 2, sy + 35);

            if (save) {
              const char = CHARACTERS[save.characterIndex];
              const level = LEVELS[save.levelIndex] || LEVELS[0];
              const timeStr = this._formatTime(save.gameTime);
              const date = new Date(save.timestamp);
              const dateStr = `${date.getFullYear()}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;

              ctx.fillStyle = '#ddd';
              ctx.font = '15px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.fillText(`角色: ${char ? char.name : '未知'}`, sx + slotW / 2, sy + 65);
              ctx.fillText(`关卡: ${level.name}`, sx + slotW / 2, sy + 88);
              ctx.fillText(`时间: ${timeStr}  分数: ${save.score}`, sx + slotW / 2, sy + 111);
              ctx.fillText(`等级: ${save.player.level}  金币: ${save.player.gold}`, sx + slotW / 2, sy + 134);

              ctx.fillStyle = '#888';
              ctx.font = '12px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.fillText(dateStr, sx + slotW / 2, sy + 158);

              ctx.fillStyle = '#ff6b6b';
              ctx.font = '13px "Segoe UI", "Microsoft YaHei", sans-serif';
              const delX = sx + slotW - 50;
              const delY = sy + slotH - 25;
              const delHovered = this.saveSelectDeleteHovered === i;
              ctx.fillStyle = delHovered ? '#ff4444' : '#ff6b6b';
              ctx.fillText('删除', delX, delY);
            } else {
              ctx.fillStyle = '#555';
              ctx.font = '16px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.fillText('空存档', sx + slotW / 2, sy + slotH / 2);
            }
          }

          const backX = 40;
          const backY = GAME_HEIGHT - 70;
          const backW = 120;
          const backH = 44;
          const backHovered = this.saveSelectBackHovered;

          ctx.fillStyle = backHovered ? 'rgba(255, 255, 255, 0.15)' : 'rgba(255, 255, 255, 0.05)';
          ctx.strokeStyle = backHovered ? '#ffd43b' : 'rgba(255, 255, 255, 0.3)';
          ctx.lineWidth = backHovered ? 3 : 2;
          ctx.beginPath();
          const br = 8;
          ctx.moveTo(backX + br, backY);
          ctx.lineTo(backX + backW - br, backY);
          ctx.quadraticCurveTo(backX + backW, backY, backX + backW, backY + br);
          ctx.lineTo(backX + backW, backY + backH - br);
          ctx.quadraticCurveTo(backX + backW, backY + backH, backX + backW - br, backY + backH);
          ctx.lineTo(backX + br, backY + backH);
          ctx.quadraticCurveTo(backX, backY + backH, backX, backY + backH - br);
          ctx.lineTo(backX, backY + br);
          ctx.quadraticCurveTo(backX, backY, backX + br, backY);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = backHovered ? '#ffd43b' : '#e8e8e8';
          ctx.font = `${backHovered ? 'bold' : 'normal'} 20px "Segoe UI", "Microsoft YaHei", sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('返回', backX + backW / 2, backY + backH / 2);
        }

        _formatTime(ms) {
          const totalSec = Math.floor(ms / 1000);
          const min = Math.floor(totalSec / 60);
          const sec = totalSec % 60;
          return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        _renderSettings(ctx) {
          ctx.fillStyle = '#0a0a14';
          ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

          ctx.fillStyle = '#fff';
          ctx.font = 'bold 40px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = 10;
          ctx.fillText('游戏设置', GAME_WIDTH / 2, 60);
          ctx.shadowBlur = 0;

          const tabY = 90;
          const tabW = 120;
          const tabH = 36;
          const tabGap = 8;
          const tabCenterX = GAME_WIDTH / 2;
          const tabs = [
            { id: 'controls', label: '控制' },
            { id: 'bestiary', label: '图鉴' }
          ];
          this._settingsTabBounds = [];
          for (let i = 0; i < tabs.length; i++) {
            const tx = tabCenterX - (tabs.length * tabW + (tabs.length - 1) * tabGap) / 2 + i * (tabW + tabGap);
            const active = this.settingsTab === tabs[i].id;
            const hovered = this._settingsTabHovered === i;
            ctx.fillStyle = active ? 'rgba(255, 212, 59, 0.2)' : (hovered ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 255, 255, 0.05)');
            ctx.strokeStyle = active ? '#ffd43b' : 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = active ? 2 : 1;
            const tr = 6;
            ctx.beginPath();
            ctx.moveTo(tx + tr, tabY);
            ctx.lineTo(tx + tabW - tr, tabY);
            ctx.quadraticCurveTo(tx + tabW, tabY, tx + tabW, tabY + tr);
            ctx.lineTo(tx + tabW, tabY + tabH - tr);
            ctx.quadraticCurveTo(tx + tabW, tabY + tabH, tx + tabW - tr, tabY + tabH);
            ctx.lineTo(tx + tr, tabY + tabH);
            ctx.quadraticCurveTo(tx, tabY + tabH, tx, tabY + tabH - tr);
            ctx.lineTo(tx, tabY + tr);
            ctx.quadraticCurveTo(tx, tabY, tx + tr, tabY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = active ? '#ffd43b' : '#ccc';
            ctx.font = `bold 16px "Segoe UI", "Microsoft YaHei", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(tabs[i].label, tx + tabW / 2, tabY + tabH / 2);
            this._settingsTabBounds.push({ x: tx, y: tabY, w: tabW, h: tabH, id: tabs[i].id });
          }

          if (this.settingsTab === 'controls') {
            this._renderControlsTab(ctx);
          } else if (this.settingsTab === 'bestiary') {
            this._renderBestiaryTab(ctx);
          }

          const backBtn = { x: 40, y: GAME_HEIGHT - 70, w: 120, h: 44 };
          const backHovered = this.settingsBackButtonHovered;
          ctx.fillStyle = backHovered ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)';
          ctx.strokeStyle = backHovered ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.2)';
          ctx.lineWidth = 2;
          const br = 8;
          ctx.beginPath();
          ctx.moveTo(backBtn.x + br, backBtn.y);
          ctx.lineTo(backBtn.x + backBtn.w - br, backBtn.y);
          ctx.quadraticCurveTo(backBtn.x + backBtn.w, backBtn.y, backBtn.x + backBtn.w, backBtn.y + br);
          ctx.lineTo(backBtn.x + backBtn.w, backBtn.y + backBtn.h - br);
          ctx.quadraticCurveTo(backBtn.x + backBtn.w, backBtn.y + backBtn.h, backBtn.x + backBtn.w - br, backBtn.y + backBtn.h);
          ctx.lineTo(backBtn.x + br, backBtn.y + backBtn.h);
          ctx.quadraticCurveTo(backBtn.x, backBtn.y + backBtn.h, backBtn.x, backBtn.y + backBtn.h - br);
          ctx.lineTo(backBtn.x, backBtn.y + br);
          ctx.quadraticCurveTo(backBtn.x, backBtn.y, backBtn.x + br, backBtn.y);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = '#ccc';
          ctx.font = '16px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('← 返回', backBtn.x + backBtn.w / 2, backBtn.y + backBtn.h / 2);
        }

        _renderControlsTab(ctx) {
          ctx.fillStyle = '#bbb';
          ctx.font = '16px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('操作按键说明', GAME_WIDTH / 2, 145);

          const controls = [
            { key: 'W / ↑', desc: '向上移动' },
            { key: 'S / ↓', desc: '向下移动' },
            { key: 'A / ←', desc: '向左移动' },
            { key: 'D / →', desc: '向右移动' },
            { key: 'Space', desc: '冲刺（朝当前方向快速位移，冲刺期间无敌）' },
            { key: 'Esc', desc: '暂停 / 继续游戏' },
            { key: '鼠标点击', desc: '菜单按钮交互' },
            { key: '任意键', desc: '跳过开场动画 / 加载画面' }
          ];

          const startY = 170;
          const lineHeight = 48;
          const keyBoxW = 140;
          const keyBoxH = 36;

          for (let i = 0; i < controls.length; i++) {
            const item = controls[i];
            const y = startY + i * lineHeight;
            const keyX = GAME_WIDTH / 2 - 160;
            const descX = GAME_WIDTH / 2 + 20;

            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            const r = 6;
            ctx.beginPath();
            ctx.moveTo(keyX + r, y);
            ctx.lineTo(keyX + keyBoxW - r, y);
            ctx.quadraticCurveTo(keyX + keyBoxW, y, keyX + keyBoxW, y + r);
            ctx.lineTo(keyX + keyBoxW, y + keyBoxH - r);
            ctx.quadraticCurveTo(keyX + keyBoxW, y + keyBoxH, keyX + keyBoxW - r, y + keyBoxH);
            ctx.lineTo(keyX + r, y + keyBoxH);
            ctx.quadraticCurveTo(keyX, y + keyBoxH, keyX, y + keyBoxH - r);
            ctx.lineTo(keyX, y + r);
            ctx.quadraticCurveTo(keyX, y, keyX + r, y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ffd43b';
            ctx.font = 'bold 16px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.key, keyX + keyBoxW / 2, y + keyBoxH / 2);

            ctx.fillStyle = '#ddd';
            ctx.font = '16px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.desc, descX, y + keyBoxH / 2);
          }

          const volY = startY + controls.length * lineHeight + 20;
          ctx.fillStyle = '#bbb';
          ctx.font = '16px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('音量', GAME_WIDTH / 2, volY);

          const sliderX = GAME_WIDTH / 2 - 120;
          const sliderW = 240;
          const sliderH = 12;
          const sliderY = volY + 24;
          ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
          ctx.beginPath();
          ctx.moveTo(sliderX + sliderH / 2, sliderY);
          ctx.lineTo(sliderX + sliderW - sliderH / 2, sliderY);
          ctx.arc(sliderX + sliderW - sliderH / 2, sliderY + sliderH / 2, sliderH / 2, -Math.PI / 2, Math.PI / 2);
          ctx.lineTo(sliderX + sliderH / 2, sliderY + sliderH);
          ctx.arc(sliderX + sliderH / 2, sliderY + sliderH / 2, sliderH / 2, Math.PI / 2, -Math.PI / 2);
          ctx.closePath();
          ctx.fill();

          const fillW = sliderW * this.audio.masterVolume;
          ctx.fillStyle = '#ffd43b';
          ctx.beginPath();
          ctx.moveTo(sliderX + sliderH / 2, sliderY);
          ctx.lineTo(sliderX + fillW - sliderH / 2, sliderY);
          ctx.arc(sliderX + fillW - sliderH / 2, sliderY + sliderH / 2, sliderH / 2, -Math.PI / 2, Math.PI / 2);
          ctx.lineTo(sliderX + sliderH / 2, sliderY + sliderH);
          ctx.arc(sliderX + sliderH / 2, sliderY + sliderH / 2, sliderH / 2, Math.PI / 2, -Math.PI / 2);
          ctx.closePath();
          ctx.fill();

          const knobX = sliderX + fillW;
          const knobR = 10;
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(knobX, sliderY + sliderH / 2, knobR, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#ffd43b';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.fillStyle = '#ddd';
          ctx.font = '14px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`${Math.round(this.audio.masterVolume * 100)}%`, GAME_WIDTH / 2, sliderY + sliderH + 18);

          this._volumeSlider = { x: sliderX, y: sliderY, w: sliderW, h: sliderH };
        }

        _renderBestiaryTab(ctx) {
          const allEnemies = [];
          for (const e of ENEMIES.common) allEnemies.push({ ...e, type: 'common' });
          for (const e of ENEMIES.elite) allEnemies.push({ ...e, type: 'elite' });
          allEnemies.push({ ...ENEMIES.boss, type: 'boss' });

          const allWeapons = Object.values(WEAPON_DEFS);

          const startY = 145;
          const cardW = 160;
          const cardH = 180;
          const gapX = 16;
          const gapY = 16;

          ctx.fillStyle = '#bbb';
          ctx.font = 'bold 18px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText('敌人图鉴', 60, startY - 10);

          const enemyCols = Math.floor((GAME_WIDTH - 120) / (cardW + gapX));
          for (let i = 0; i < allEnemies.length; i++) {
            const col = i % enemyCols;
            const row = Math.floor(i / enemyCols);
            const cx = 60 + col * (cardW + gapX);
            const cy = startY + row * (cardH + gapY);
            const unlocked = this.bestiary.enemies[allEnemies[i].id];
            this._renderBestiaryCard(ctx, cx, cy, cardW, cardH, allEnemies[i], unlocked, 'enemy');
          }

          const enemyRows = Math.ceil(allEnemies.length / enemyCols);
          const weaponStartY = startY + enemyRows * (cardH + gapY) + 30;

          ctx.fillStyle = '#bbb';
          ctx.font = 'bold 18px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText('武器图鉴', 60, weaponStartY - 10);

          for (let i = 0; i < allWeapons.length; i++) {
            const col = i % enemyCols;
            const row = Math.floor(i / enemyCols);
            const cx = 60 + col * (cardW + gapX);
            const cy = weaponStartY + row * (cardH + gapY);
            const unlocked = this.bestiary.weapons[allWeapons[i].id];
            this._renderBestiaryCard(ctx, cx, cy, cardW, cardH, allWeapons[i], unlocked, 'weapon');
          }
        }

        _renderBestiaryCard(ctx, x, y, w, h, data, unlocked, type) {
          ctx.fillStyle = unlocked ? 'rgba(255, 255, 255, 0.08)' : 'rgba(0, 0, 0, 0.5)';
          ctx.strokeStyle = unlocked ? 'rgba(255, 255, 255, 0.3)' : 'rgba(0, 0, 0, 0.6)';
          ctx.lineWidth = 1;
          const r = 8;
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r);
          ctx.lineTo(x + w, y + h - r);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          const imgSize = 80;
          const imgX = x + (w - imgSize) / 2;
          const imgY = y + 12;

          if (unlocked) {
            let sprite = null;
            if (type === 'enemy') {
              sprite = ENEMY_SPRITES[data.id];
            } else if (type === 'weapon') {
              sprite = WEAPON_SPRITES[data.id];
            }
            const isReady = sprite && (sprite instanceof HTMLCanvasElement || (sprite.complete && sprite.naturalWidth > 0));
            if (isReady) {
              ctx.drawImage(sprite, imgX, imgY, imgSize, imgSize);
            } else {
              ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
              ctx.fillRect(imgX, imgY, imgSize, imgSize);
            }
          } else {
            ctx.fillStyle = '#111';
            ctx.fillRect(imgX, imgY, imgSize, imgSize);
            ctx.fillStyle = '#333';
            ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('?', imgX + imgSize / 2, imgY + imgSize / 2);
          }

          ctx.fillStyle = unlocked ? '#fff' : '#555';
          ctx.font = `bold 14px "Segoe UI", "Microsoft YaHei", sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
          const name = unlocked ? data.name : '???';
          ctx.fillText(name, x + w / 2, imgY + imgSize + 22);

          if (unlocked) {
            ctx.fillStyle = '#aaa';
            ctx.font = '12px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.fillText(data.nameEn || '', x + w / 2, imgY + imgSize + 40);

            if (type === 'enemy') {
              ctx.fillStyle = '#888';
              ctx.font = '11px "Segoe UI", "Microsoft YaHei", sans-serif';
              const typeLabel = data.type === 'boss' ? 'Boss' : (data.type === 'elite' ? '精英' : '普通');
              ctx.fillText(`HP:${data.hp} ATK:${data.atk} ${typeLabel}`, x + w / 2, imgY + imgSize + 56);
            } else if (type === 'weapon') {
              ctx.fillStyle = '#888';
              ctx.font = '11px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.fillText(`${data.type === 'melee' ? '近战' : '远程'} 伤害:${data.baseDamage}`, x + w / 2, imgY + imgSize + 56);
            }
          }
        }

        _renderLevelSelect(ctx) {
          if (this.selectedLevelIndex >= 0) {
            const lvl = LEVELS[this.selectedLevelIndex];
            const bgImg = LEVEL_BG_IMAGES[lvl.id];
            if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
              const imgRatio = bgImg.naturalWidth / bgImg.naturalHeight;
              const canvasRatio = GAME_WIDTH / GAME_HEIGHT;
              let sx, sy, sWidth, sHeight;
              if (imgRatio > canvasRatio) {
                sHeight = bgImg.naturalHeight;
                sWidth = sHeight * canvasRatio;
                sx = (bgImg.naturalWidth - sWidth) / 2;
                sy = 0;
              } else {
                sWidth = bgImg.naturalWidth;
                sHeight = sWidth / canvasRatio;
                sx = 0;
                sy = (bgImg.naturalHeight - sHeight) / 2;
              }
              ctx.drawImage(bgImg, sx, sy, sWidth, sHeight, 0, 0, GAME_WIDTH, GAME_HEIGHT);
              ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
              ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            } else {
              ctx.fillStyle = '#0a0a14';
              ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            }
          } else {
            ctx.fillStyle = '#0a0a14';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
          }

          ctx.fillStyle = '#fff';
          ctx.font = 'bold 40px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = 10;
          ctx.fillText('选择关卡', GAME_WIDTH / 2, 70);
          ctx.shadowBlur = 0;

          ctx.fillStyle = '#bbb';
          ctx.font = '16px sans-serif';
          ctx.fillText('点击关卡卡片查看详情，确认后点击继续', GAME_WIDTH / 2, 105);

          const cardW = 220;
          const cardH = 280;
          const gap = 20;
          const totalW = LEVELS.length * cardW + (LEVELS.length - 1) * gap;
          const startX = (GAME_WIDTH - totalW) / 2;
          const startY = 140;

          if (!this.levelSelectButtons || this.levelSelectButtons.length === 0) {
            this.levelSelectButtons = [];
            for (let i = 0; i < LEVELS.length; i++) {
              this.levelSelectButtons.push({
                x: startX + i * (cardW + gap),
                y: startY,
                w: cardW,
                h: cardH,
                hovered: false,
                level: LEVELS[i]
              });
            }
          }

          for (let i = 0; i < this.levelSelectButtons.length; i++) {
            const btn = this.levelSelectButtons[i];
            const lvl = btn.level;
            const isSelected = this.selectedLevelIndex === i;
            const isHovered = btn.hovered;

            const glow = isSelected ? 20 : (isHovered ? 12 : 0);
            if (glow > 0) {
              ctx.shadowColor = isSelected ? '#ffd43b' : 'rgba(255, 255, 255, 0.3)';
              ctx.shadowBlur = glow;
            }

            ctx.fillStyle = isSelected ? 'rgba(255, 212, 59, 0.12)' : 'rgba(255, 255, 255, 0.06)';
            ctx.strokeStyle = isSelected ? '#ffd43b' : (isHovered ? 'rgba(255, 255, 255, 0.5)' : 'rgba(255, 255, 255, 0.15)');
            ctx.lineWidth = isSelected ? 3 : 2;

            const r = 12;
            ctx.beginPath();
            ctx.moveTo(btn.x + r, btn.y);
            ctx.lineTo(btn.x + btn.w - r, btn.y);
            ctx.quadraticCurveTo(btn.x + btn.w, btn.y, btn.x + btn.w, btn.y + r);
            ctx.lineTo(btn.x + btn.w, btn.y + btn.h - r);
            ctx.quadraticCurveTo(btn.x + btn.w, btn.y + btn.h, btn.x + btn.w - r, btn.y + btn.h);
            ctx.lineTo(btn.x + r, btn.y + btn.h);
            ctx.quadraticCurveTo(btn.x, btn.y + btn.h, btn.x, btn.y + btn.h - r);
            ctx.lineTo(btn.x, btn.y + r);
            ctx.quadraticCurveTo(btn.x, btn.y, btn.x + r, btn.y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;

            let ty = btn.y + 30;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(lvl.name, btn.x + btn.w / 2, ty);

            ty += 22;
            ctx.fillStyle = '#888';
            ctx.font = 'italic 14px sans-serif';
            ctx.fillText(lvl.nameEn, btn.x + btn.w / 2, ty);

            ty += 36;
            ctx.fillStyle = '#aaa';
            ctx.font = '14px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('点击查看详情', btn.x + btn.w / 2, ty);

          }

          if (this.selectedLevelIndex >= 0) {
            const confirmBtnW = 200;
            const confirmBtnH = 52;
            const confirmBtnX = (GAME_WIDTH - confirmBtnW) / 2;
            const confirmBtnY = GAME_HEIGHT - 80;
            const confirmHovered = this.levelConfirmButtonHovered;

            ctx.fillStyle = confirmHovered ? 'rgba(255, 212, 59, 0.25)' : 'rgba(255, 212, 59, 0.12)';
            ctx.strokeStyle = confirmHovered ? '#ffd43b' : 'rgba(255, 212, 59, 0.5)';
            ctx.lineWidth = confirmHovered ? 3 : 2;
            const cfr = 10;
            ctx.beginPath();
            ctx.moveTo(confirmBtnX + cfr, confirmBtnY);
            ctx.lineTo(confirmBtnX + confirmBtnW - cfr, confirmBtnY);
            ctx.quadraticCurveTo(confirmBtnX + confirmBtnW, confirmBtnY, confirmBtnX + confirmBtnW, confirmBtnY + cfr);
            ctx.lineTo(confirmBtnX + confirmBtnW, confirmBtnY + confirmBtnH - cfr);
            ctx.quadraticCurveTo(confirmBtnX + confirmBtnW, confirmBtnY + confirmBtnH, confirmBtnX + confirmBtnW - cfr, confirmBtnY + confirmBtnH);
            ctx.lineTo(confirmBtnX + cfr, confirmBtnY + confirmBtnH);
            ctx.quadraticCurveTo(confirmBtnX, confirmBtnY + confirmBtnH, confirmBtnX, confirmBtnY + confirmBtnH - cfr);
            ctx.lineTo(confirmBtnX, confirmBtnY + cfr);
            ctx.quadraticCurveTo(confirmBtnX, confirmBtnY, confirmBtnX + cfr, confirmBtnY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ffd43b';
            ctx.font = 'bold 20px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('选择此关卡', confirmBtnX + confirmBtnW / 2, confirmBtnY + confirmBtnH / 2);
          }

          const backBtn = { x: 40, y: GAME_HEIGHT - 70, w: 120, h: 44 };
          const backHovered = this.levelBackButtonHovered;
          ctx.fillStyle = backHovered ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)';
          ctx.strokeStyle = backHovered ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.2)';
          ctx.lineWidth = 2;
          const br = 8;
          ctx.beginPath();
          ctx.moveTo(backBtn.x + br, backBtn.y);
          ctx.lineTo(backBtn.x + backBtn.w - br, backBtn.y);
          ctx.quadraticCurveTo(backBtn.x + backBtn.w, backBtn.y, backBtn.x + backBtn.w, backBtn.y + br);
          ctx.lineTo(backBtn.x + backBtn.w, backBtn.y + backBtn.h - br);
          ctx.quadraticCurveTo(backBtn.x + backBtn.w, backBtn.y + backBtn.h, backBtn.x + backBtn.w - br, backBtn.y + backBtn.h);
          ctx.lineTo(backBtn.x + br, backBtn.y + backBtn.h);
          ctx.quadraticCurveTo(backBtn.x, backBtn.y + backBtn.h, backBtn.x, backBtn.y + backBtn.h - br);
          ctx.lineTo(backBtn.x, backBtn.y + br);
          ctx.quadraticCurveTo(backBtn.x, backBtn.y, backBtn.x + br, backBtn.y);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = '#ccc';
          ctx.font = '16px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('← 返回', backBtn.x + backBtn.w / 2, backBtn.y + backBtn.h / 2);
        }

        drawHUD(ctx) {
          ctx.fillStyle = '#fff';
          ctx.font = '16px monospace';
          ctx.textAlign = 'left';
          ctx.fillText(`FPS: ${this.fps.toFixed(0)}`, 10, 24);
          ctx.fillText(`Entities: ${this.entityManager.getAll().length}`, 10, 44);

          const p = this.player;
          const barX = 10;
          const barW = 200;

          // HP Bar
          const hpPercent = Math.max(0, p.hp / p.maxHp);
          ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
          ctx.fillRect(barX, 60, barW, 20);
          ctx.fillStyle = '#51cf66';
          ctx.fillRect(barX, 60, barW * hpPercent, 20);
          ctx.strokeStyle = '#2b8a3e';
          ctx.lineWidth = 1;
          ctx.strokeRect(barX, 60, barW, 20);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 12px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(`HP: ${Math.floor(p.hp)}/${p.maxHp}`, barX + 6, 70);

          // EXP Bar
          const expInLevel = p.exp;
          const expNeeded = p.expToNextLevel();
          const expPercent = expInLevel / expNeeded;
          const level = p.getLevel();
          ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
          ctx.fillRect(barX, 86, barW, 10);
          ctx.fillStyle = '#fcc419';
          ctx.fillRect(barX, 86, barW * expPercent, 10);
          ctx.strokeStyle = '#e67700';
          ctx.lineWidth = 1;
          ctx.strokeRect(barX, 86, barW, 10);
          ctx.fillStyle = '#ffd43b';
          ctx.font = 'bold 12px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText(`Lv. ${level}`, barX, 112);

          ctx.fillStyle = '#ffd43b';
          ctx.font = 'bold 14px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
          ctx.beginPath();
          ctx.arc(barX + 8, 128, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#f59f00';
          ctx.font = 'bold 9px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('$', barX + 8, 129);
          ctx.fillStyle = '#ffd43b';
          ctx.font = 'bold 14px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText(`${p.gold}`, barX + 20, 134);

          // Game Time (top-right)
          const totalSeconds = Math.floor(this.gameTime / 1000);
          const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
          const seconds = (totalSeconds % 60).toString().padStart(2, '0');
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 20px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'right';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText(`${minutes}:${seconds}`, GAME_WIDTH - 20, 30);

          if (this.difficultyMultiplier > 1.0) {
            ctx.fillStyle = '#ff922b';
            ctx.font = 'bold 14px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText(`难度 x${this.difficultyMultiplier.toFixed(1)}`, GAME_WIDTH - 20, 52);
          }

          if (this.difficultyNotifTimer > 0) {
            const notifAlpha = Math.min(1, this.difficultyNotifTimer / 500);
            const notifScale = 1 + Math.max(0, (this.difficultyNotifTimer - 2500) / 500) * 0.3;
            ctx.save();
            ctx.globalAlpha = notifAlpha;
            ctx.translate(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 60);
            ctx.scale(notifScale, notifScale);
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 36px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 20;
            ctx.fillText('难度up！！', 0, 0);
            ctx.shadowBlur = 0;
            ctx.restore();
          }

          // Weapon (right side vertical)
          if (p.weapon) {
            ctx.fillStyle = '#fff';
            ctx.font = '14px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText(`武器: ${p.weapon.name || '无'}`, GAME_WIDTH - 20, 70);
          }

          if (p.charData) {
            ctx.fillStyle = '#74c0fc';
            ctx.font = '13px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText(`被动: ${p.charData.passive.description}`, GAME_WIDTH - 20, 92);
          }

          const invWeapons = p.weaponInventory.getAll();
          if (invWeapons.length > 0) {
            let wy = 110;
            ctx.fillStyle = '#aaa';
            ctx.font = '12px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'alphabetic';
            for (const w of invWeapons) {
              const wDef = WEAPON_DEFS[w.id];
              if (wDef) {
                ctx.fillStyle = w.id === 'whip' ? '#ff922b' : '#74c0fc';
                ctx.fillText(`${wDef.name} Lv.${w.level}`, GAME_WIDTH - 20, wy);
                wy += 18;
              }
            }
          }

          const arcanaCards = p.arcanaInventory.getAll();
          if (arcanaCards.length > 0) {
            let ay = 110 + (invWeapons.length > 0 ? invWeapons.length * 18 + 10 : 0);
            ctx.fillStyle = '#aaa';
            ctx.font = '12px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'alphabetic';
            for (const arcana of arcanaCards) {
              ctx.fillStyle = arcana.color;
              ctx.fillText(`${arcana.icon} ${arcana.name} x${arcana.count}`, GAME_WIDTH - 20, ay);
              ay += 18;
            }
          }

          // Kills (bottom-left)
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 16px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText(`Kills: ${p.kills}`, 10, GAME_HEIGHT - 40);
          ctx.fillStyle = '#ffd43b';
          ctx.fillText(`Score: ${window.game.score}`, 10, GAME_HEIGHT - 20);

          // Burst Skill (bottom-right)
          const burst = p.burstSkill;
          const skillX = GAME_WIDTH - 80;
          const skillY = GAME_HEIGHT - 80;
          const skillR = 30;

          ctx.beginPath();
          ctx.arc(skillX, skillY, skillR, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
          ctx.fill();
          ctx.strokeStyle = burst.ready ? '#ff6b6b' : '#555';
          ctx.lineWidth = 3;
          ctx.stroke();

          if (!burst.ready) {
            const cdPercent = burst.getCooldownPercent();
            ctx.beginPath();
            ctx.moveTo(skillX, skillY);
            ctx.arc(skillX, skillY, skillR, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * cdPercent);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255, 107, 107, 0.4)';
            ctx.fill();
          }

          ctx.fillStyle = burst.ready ? '#ff6b6b' : '#888';
          ctx.font = 'bold 14px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('爆发', skillX, skillY);

          ctx.fillStyle = burst.ready ? '#ffd43b' : '#666';
          ctx.font = '11px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText(burst.ready ? '滑动释放' : `${(burst.cooldownTimer / 1000).toFixed(1)}s`, skillX, skillY + skillR + 16);

          const dashX = GAME_WIDTH - 160;
          const dashY = GAME_HEIGHT - 80;
          const dashR = 30;
          const dashReady = p.dashCooldown <= 0 && !p.isDashing;

          ctx.beginPath();
          ctx.arc(dashX, dashY, dashR, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
          ctx.fill();
          ctx.strokeStyle = dashReady ? '#74c0fc' : '#555';
          ctx.lineWidth = 3;
          ctx.stroke();

          if (!dashReady && p.dashCooldown > 0) {
            const dashCdPercent = 1 - (p.dashCooldown / p.dashCooldownMax);
            ctx.beginPath();
            ctx.moveTo(dashX, dashY);
            ctx.arc(dashX, dashY, dashR, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * dashCdPercent);
            ctx.closePath();
            ctx.fillStyle = 'rgba(116, 192, 252, 0.4)';
            ctx.fill();
          }

          ctx.fillStyle = dashReady ? '#74c0fc' : '#888';
          ctx.font = 'bold 14px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('冲刺', dashX, dashY);

          ctx.fillStyle = dashReady ? '#ffd43b' : '#666';
          ctx.font = '11px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText(dashReady ? '空格键' : `${(p.dashCooldown / 1000).toFixed(1)}s`, dashX, dashY + dashR + 16);
        }

        _renderArcanaSelect(ctx) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
          ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

          ctx.fillStyle = '#ffd43b';
          ctx.font = 'bold 32px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
          ctx.shadowColor = '#ffd43b';
          ctx.shadowBlur = 15;
          ctx.fillText('选择塔罗牌', GAME_WIDTH / 2, 80);
          ctx.shadowBlur = 0;

          ctx.fillStyle = '#aaa';
          ctx.font = '14px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.fillText(`选择次数 ${this.arcanaSelectCount}/5`, GAME_WIDTH / 2, 110);

          const cardW = 180;
          const cardH = 260;
          const gap = 30;
          const totalW = ARCANAS.length * cardW + (ARCANAS.length - 1) * gap;
          const startX = (GAME_WIDTH - totalW) / 2;
          const startY = 140;

          if (!this.arcanaCardBounds) {
            this.arcanaCardBounds = [];
          }
          this.arcanaCardBounds = [];

          for (let i = 0; i < ARCANAS.length; i++) {
            const arcana = ARCANAS[i];
            const cx = startX + i * (cardW + gap);
            const cy = startY;
            const owned = this.player.arcanaInventory.has(arcana.id);
            const arcanaCount = this.player.arcanaInventory.getCount(arcana.id);
            const maxed = arcanaCount >= 5;
            const hovered = this.arcanaHoveredIndex === i;

            this.arcanaCardBounds.push({ x: cx, y: cy, w: cardW, h: cardH, arcanaId: arcana.id });

            ctx.save();
            if (hovered && !maxed) {
              ctx.shadowColor = arcana.color;
              ctx.shadowBlur = 20;
            }

            const cr = 12;
            ctx.beginPath();
            ctx.moveTo(cx + cr, cy);
            ctx.lineTo(cx + cardW - cr, cy);
            ctx.quadraticCurveTo(cx + cardW, cy, cx + cardW, cy + cr);
            ctx.lineTo(cx + cardW, cy + cardH - cr);
            ctx.quadraticCurveTo(cx + cardW, cy + cardH, cx + cardW - cr, cy + cardH);
            ctx.lineTo(cx + cr, cy + cardH);
            ctx.quadraticCurveTo(cx, cy + cardH, cx, cy + cardH - cr);
            ctx.lineTo(cx, cy + cr);
            ctx.quadraticCurveTo(cx, cy, cx + cr, cy);
            ctx.closePath();

            if (maxed) {
              ctx.fillStyle = 'rgba(50, 50, 50, 0.9)';
            } else if (hovered) {
              ctx.fillStyle = 'rgba(30, 30, 60, 0.95)';
            } else {
              ctx.fillStyle = 'rgba(20, 20, 40, 0.9)';
            }
            ctx.fill();

            ctx.strokeStyle = maxed ? '#555' : (hovered ? arcana.color : 'rgba(255, 255, 255, 0.3)');
            ctx.lineWidth = maxed ? 1 : (hovered ? 3 : 2);
            ctx.stroke();
            ctx.restore();

            ctx.fillStyle = maxed ? '#555' : arcana.color;
            ctx.font = '48px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(arcana.icon, cx + cardW / 2, cy + 60);

            ctx.fillStyle = maxed ? '#666' : arcana.color;
            ctx.font = 'bold 18px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText(arcana.name, cx + cardW / 2, cy + 110);

            ctx.fillStyle = maxed ? '#555' : '#aaa';
            ctx.font = '13px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.fillText(arcana.nameEn, cx + cardW / 2, cy + 132);

            ctx.fillStyle = maxed ? '#555' : '#ddd';
            ctx.font = '14px "Segoe UI", "Microsoft YaHei", sans-serif';
            const descLines = this._wrapText(arcana.desc, cardW - 30);
            for (let l = 0; l < descLines.length; l++) {
              ctx.fillText(descLines[l], cx + cardW / 2, cy + 165 + l * 20);
            }

            if (maxed) {
              ctx.fillStyle = '#ff6b6b';
              ctx.font = 'bold 16px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.fillText('已满级 (5/5)', cx + cardW / 2, cy + cardH - 30);
            } else if (arcanaCount > 0) {
              ctx.fillStyle = arcana.color;
              ctx.font = 'bold 16px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.fillText(hovered ? `点击叠加 (${arcanaCount}/5)` : `已选 ${arcanaCount}/5`, cx + cardW / 2, cy + cardH - 30);
            } else if (hovered) {
              ctx.fillStyle = arcana.color;
              ctx.font = 'bold 16px "Segoe UI", "Microsoft YaHei", sans-serif';
              ctx.fillText('点击选择', cx + cardW / 2, cy + cardH - 30);
            }
          }

          const skipY = startY + cardH + 30;
          ctx.fillStyle = '#888';
          ctx.font = '16px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText('点击空白处跳过', GAME_WIDTH / 2, skipY);
        }

        _wrapText(text, maxWidth) {
          const words = text.split('');
          const lines = [];
          let line = '';
          for (const char of words) {
            const test = line + char;
            if (test.length * 14 > maxWidth) {
              lines.push(line);
              line = char;
            } else {
              line = test;
            }
          }
          if (line) lines.push(line);
          return lines;
        }

        _renderDeathQuotes(ctx) {
          const now = performance.now();
          this.deathQuotes = this.deathQuotes.filter(q => now - q.born < q.life);
          for (const q of this.deathQuotes) {
            const elapsed = now - q.born;
            q.alpha = Math.max(0, 1 - elapsed / q.life);
            const screenX = q.x - this.camera.x;
            const screenY = q.y - this.camera.y - elapsed * 0.02;
            ctx.save();
            ctx.globalAlpha = q.alpha;
            ctx.fillStyle = '#fff';
            ctx.font = '14px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 4;
            ctx.fillText(q.text, screenX, screenY);
            ctx.shadowBlur = 0;
            ctx.restore();
          }
        }
      }

      const game = new Game();
      window.game = game;

      let lastTime = performance.now();
      let accumulator = 0;

      function gameLoop(currentTime) {
        requestAnimationFrame(gameLoop);

        const frameTime = currentTime - lastTime;
        lastTime = currentTime;

        game.frameCount++;
        if (currentTime - game.lastFpsTime >= 1000) {
          game.fps = game.frameCount;
          game.frameCount = 0;
          game.lastFpsTime = currentTime;
        }

        accumulator += frameTime;
        while (accumulator >= FIXED_DT) {
          game.update(FIXED_DT);
          accumulator -= FIXED_DT;
        }

        game.render(ctx);
      }

      game.intro.start();
      game.audio.startMusic('intro');
      requestAnimationFrame(gameLoop);

      function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = GAME_WIDTH / rect.width;
        const scaleY = GAME_HEIGHT / rect.height;
        return {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY
        };
      }

      function handlePointerDown(e) {
        if (game.intro.active) {
          game.intro.skip();
          return;
        }
        if (game.loading.active) {
          game.loading.skip();
          return;
        }
        if (game.state === 'MENU') {
          const pos = getMousePos(e);
          for (const btn of game.menuButtons) {
            if (btn.contains(pos.x, pos.y) && !btn.isDisabled()) {
              btn.onClick();
              return;
            }
          }
        }
        if (game.state === 'SAVE_SELECT') {
          const pos = getMousePos(e);
          for (const slot of game.saveSelectSlotBounds) {
            if (pos.x >= slot.x && pos.x <= slot.x + slot.w && pos.y >= slot.y && pos.y <= slot.y + slot.h) {
              const save = game._loadGame(slot.slot);
              if (save) {
                game._restoreFromSave(save);
                return;
              }
            }
          }
          const saves = game._getAllSaves();
          for (let i = 0; i < game.saveSelectSlotBounds.length; i++) {
            const slot = game.saveSelectSlotBounds[i];
            if (saves[i]) {
              const delX = slot.x + slot.w - 80;
              const delY = slot.y + slot.h - 35;
              const delW = 60;
              const delH = 25;
              if (pos.x >= delX && pos.x <= delX + delW && pos.y >= delY && pos.y <= delY + delH) {
                game._deleteSave(slot.slot);
                return;
              }
            }
          }
          const backX2 = 40;
          const backY2 = GAME_HEIGHT - 70;
          if (pos.x >= backX2 && pos.x <= backX2 + 120 && pos.y >= backY2 && pos.y <= backY2 + 44) {
            game.setState('MENU');
            return;
          }
        }
        if (game.state === 'LEVEL_SELECT') {
          const pos = getMousePos(e);
          for (let i = 0; i < game.levelSelectButtons.length; i++) {
            const btn = game.levelSelectButtons[i];
            if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
              game.selectedLevelIndex = i;
              return;
            }
          }
          if (game.selectedLevelIndex >= 0) {
            const confirmBtnW = 200;
            const confirmBtnH = 52;
            const confirmBtnX = (GAME_WIDTH - confirmBtnW) / 2;
            const confirmBtnY = GAME_HEIGHT - 80;
            if (pos.x >= confirmBtnX && pos.x <= confirmBtnX + confirmBtnW && pos.y >= confirmBtnY && pos.y <= confirmBtnY + confirmBtnH) {
              game.setState('CHARACTER_SELECT');
              return;
            }
          }
          const backBtn = { x: 40, y: GAME_HEIGHT - 70, w: 120, h: 44 };
          if (pos.x >= backBtn.x && pos.x <= backBtn.x + backBtn.w && pos.y >= backBtn.y && pos.y <= backBtn.y + backBtn.h) {
            game.selectedLevelIndex = -1;
            game.setState('MENU');
          }
        }
        if (game.state === 'CHARACTER_SELECT') {
          const pos = getMousePos(e);
          for (let i = 0; i < game.characterSelectButtons.length; i++) {
            const btn = game.characterSelectButtons[i];
            if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
              game.selectedCharacterIndex = i;
              return;
            }
          }
          const confirmBtn = { x: (GAME_WIDTH - 200) / 2, y: GAME_HEIGHT - 90, w: 200, h: 52 };
          if (game.selectedCharacterIndex >= 0 && pos.x >= confirmBtn.x && pos.x <= confirmBtn.x + confirmBtn.w && pos.y >= confirmBtn.y && pos.y <= confirmBtn.y + confirmBtn.h) {
            const level = LEVELS[game.selectedLevelIndex] || LEVELS[0];
            const char = CHARACTERS[game.selectedCharacterIndex];
            if (char && CHARACTER_SPRITES[char.id]) {
              game.player.setSprite(CHARACTER_SPRITES[char.id]);
            }
            if (char) {
              const weaponData = { name: char.weapon, id: char.id };
              game.player.setWeapon(weaponData);
              game.unlockBestiaryWeapon(char.id);
            }
            game.loading.start(level.loadText, () => {
              game.setState('PLAYING');
            });
            return;
          }
          const backBtn = { x: 40, y: GAME_HEIGHT - 70, w: 120, h: 44 };
          if (pos.x >= backBtn.x && pos.x <= backBtn.x + backBtn.w && pos.y >= backBtn.y && pos.y <= backBtn.y + backBtn.h) {
            game.selectedCharacterIndex = -1;
            game.setState('LEVEL_SELECT');
          }
        }
        if (game.state === 'ARCANA_SELECT') {
          const pos = getMousePos(e);
          let clicked = false;
          if (game.arcanaCardBounds) {
            for (const card of game.arcanaCardBounds) {
              if (pos.x >= card.x && pos.x <= card.x + card.w && pos.y >= card.y && pos.y <= card.y + card.h) {
                if (game.player.arcanaInventory.canAdd(card.arcanaId)) {
                  game.player.arcanaInventory.add(card.arcanaId);
                  game.audio.playLevelUp();
                }
                clicked = true;
                break;
              }
            }
          }
          game.arcanaSelectCount++;
          game.state = 'PLAYING';
          return;
        }
        if (game.state === 'PAUSED') {
          const pos = getMousePos(e);
          if (game._showSaveSlotSelect) {
            for (const slot of game._pauseSaveSlotBounds) {
              if (pos.x >= slot.x && pos.x <= slot.x + slot.w && pos.y >= slot.y && pos.y <= slot.y + slot.h) {
                game._saveGame(slot.slot);
                game._showSaveSlotSelect = false;
                game._pauseSaveSlotHovered = -1;
                game.setState('MENU');
                return;
              }
            }
            const slotH2 = 160;
            const startY2 = 130;
            const cancelX2 = (GAME_WIDTH - 160) / 2;
            const cancelY2 = startY2 + slotH2 + 30;
            if (pos.x >= cancelX2 && pos.x <= cancelX2 + 160 && pos.y >= cancelY2 && pos.y <= cancelY2 + 44) {
              game._showSaveSlotSelect = false;
              game._pauseSaveSlotHovered = -1;
              return;
            }
          } else {
            for (const btn of game.pauseMenuButtons) {
              if (btn.contains(pos.x, pos.y)) {
                btn.onClick();
                return;
              }
            }
          }
        }
        if (game.state === 'GAME_OVER') {
          const pos = getMousePos(e);
          const btnW = 220, btnH = 52, btnGap = 20;
          const btnStartY = GAME_HEIGHT / 2 + 110;
          const btnX = (GAME_WIDTH - btnW) / 2;
          const retryBtn = { x: btnX, y: btnStartY, w: btnW, h: btnH };
          const menuBtn = { x: btnX, y: btnStartY + btnH + btnGap, w: btnW, h: btnH };
          if (pos.x >= retryBtn.x && pos.x <= retryBtn.x + retryBtn.w && pos.y >= retryBtn.y && pos.y <= retryBtn.y + retryBtn.h) {
            game._restartGame();
            return;
          }
          if (pos.x >= menuBtn.x && pos.x <= menuBtn.x + menuBtn.w && pos.y >= menuBtn.y && pos.y <= menuBtn.y + menuBtn.h) {
            game.setState('MENU');
            return;
          }
        }
        if (game.state === 'PLAYING') {
          const pos = getMousePos(e);
          const bossBtn = { x: GAME_WIDTH - 160, y: 20, w: 140, h: 44 };
          if (pos.x >= bossBtn.x && pos.x <= bossBtn.x + bossBtn.w && pos.y >= bossBtn.y && pos.y <= bossBtn.y + bossBtn.h) {
            game.spawnBoss();
            return;
          }
          const shopBtn = { x: GAME_WIDTH - 160, y: 72, w: 140, h: 44 };
          if (pos.x >= shopBtn.x && pos.x <= shopBtn.x + shopBtn.w && pos.y >= shopBtn.y && pos.y <= shopBtn.y + shopBtn.h) {
            game.setState('SHOP');
            return;
          }
          const diffBtn = { x: GAME_WIDTH - 160, y: 124, w: 140, h: 44 };
          if (pos.x >= diffBtn.x && pos.x <= diffBtn.x + diffBtn.w && pos.y >= diffBtn.y && pos.y <= diffBtn.y + diffBtn.h) {
            game.difficultyMultiplier *= 1.1;
            game.difficultyNotifTimer = 3000;
            return;
          }
          const goldBtn = { x: GAME_WIDTH - 160, y: 176, w: 140, h: 44 };
          if (pos.x >= goldBtn.x && pos.x <= goldBtn.x + goldBtn.w && pos.y >= goldBtn.y && pos.y <= goldBtn.y + goldBtn.h) {
            game.player.gold += 100;
            return;
          }
        }
        if (game.state === 'SHOP') {
          const pos = getMousePos(e);
          const panelW = 960;
          const panelH = 520;
          const panelX = (GAME_WIDTH - panelW) / 2;
          const panelY = (GAME_HEIGHT - panelH) / 2;
          const merchantAreaW = 240;
          const shopAreaW = panelW - merchantAreaW - 30;
          const cols = 2;
          const itemGapX = 12;
          const itemGapY = 8;
          const itemH = 70;
          const itemW = (shopAreaW - 20 - itemGapX) / cols;
          const itemStartX = panelX + 10;
          const itemStartY = panelY + 82;
          const sp = game.player;
          const whipOwned = sp.weaponInventory.has('whip');
          const crossOwned = sp.weaponInventory.has('cross');
          const whipCanUpgrade = whipOwned && sp.weaponInventory.canUpgrade('whip');
          const crossCanUpgrade = crossOwned && sp.weaponInventory.canUpgrade('cross');
          const whipLvl = whipOwned ? sp.weaponInventory.getLevel('whip') : 0;
          const crossLvl = crossOwned ? sp.weaponInventory.getLevel('cross') : 0;
          const shopItems = [
            { cost: 10, canBuy: game.player.gold >= 10, action: () => { game.player.gold -= 10; game.player.maxHp += 10; game.player.hp += 10; game.audio.playExpPickup(); } },
            { cost: 100, canBuy: game.player.gold >= 100, action: () => { game.player.gold -= 100; game.player.attackBonus += 1; game.audio.playLevelUp(); } },
            { cost: 10, canBuy: game.player.gold >= 10 && (!whipOwned || whipCanUpgrade), action: () => { game.player.gold -= 10; if (!whipOwned) { game.player.weaponInventory.add('whip'); game.unlockBestiaryWeapon('whip'); } else { game.player.weaponInventory.upgrade('whip'); } game.audio.playLevelUp(); } },
            { cost: 10, canBuy: game.player.gold >= 10 && (!crossOwned || crossCanUpgrade), action: () => { game.player.gold -= 10; if (!crossOwned) { game.player.weaponInventory.add('cross'); game.unlockBestiaryWeapon('cross'); } else { game.player.weaponInventory.upgrade('cross'); } game.audio.playLevelUp(); } },
            { cost: 100, canBuy: game.player.gold >= 100 && game.player.arcanaInventory.canAdd('fool'), action: () => { game.player.gold -= 100; game.player.arcanaInventory.add('fool'); game.audio.playLevelUp(); } },
            { cost: 100, canBuy: game.player.gold >= 100 && game.player.arcanaInventory.canAdd('gemini'), action: () => { game.player.gold -= 100; game.player.arcanaInventory.add('gemini'); game.audio.playLevelUp(); } },
            { cost: 100, canBuy: game.player.gold >= 100 && game.player.arcanaInventory.canAdd('priestess'), action: () => { game.player.gold -= 100; game.player.arcanaInventory.add('priestess'); game.audio.playLevelUp(); } },
            { cost: 100, canBuy: game.player.gold >= 100 && game.player.arcanaInventory.canAdd('emperor'), action: () => { game.player.gold -= 100; game.player.arcanaInventory.add('emperor'); game.audio.playLevelUp(); } }
          ];
          for (let i = 0; i < 8; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const ix = itemStartX + col * (itemW + itemGapX);
            const iy = itemStartY + row * (itemH + itemGapY);
            const buyBtnW = 70;
            const buyBtnH = 30;
            const buyBtnX = ix + itemW - buyBtnW - 8;
            const buyBtnY = iy + (itemH - buyBtnH) / 2;
            if (pos.x >= buyBtnX && pos.x <= buyBtnX + buyBtnW && pos.y >= buyBtnY && pos.y <= buyBtnY + buyBtnH) {
              if (shopItems[i].canBuy) {
                shopItems[i].action();
              }
              return;
            }
          }
          const closeBtnW = 140;
          const closeBtnH = 40;
          const closeBtnCenterX = panelX + shopAreaW / 2;
          const closeBtnY = panelY + panelH - 50;
          if (pos.x >= closeBtnCenterX - closeBtnW / 2 && pos.x <= closeBtnCenterX + closeBtnW / 2 && pos.y >= closeBtnY && pos.y <= closeBtnY + closeBtnH) {
            game.setState('PLAYING');
            return;
          }
        }
        if (game.state === 'SETTINGS') {
          const pos = getMousePos(e);
          if (game._settingsTabBounds) {
            for (const tb of game._settingsTabBounds) {
              if (pos.x >= tb.x && pos.x <= tb.x + tb.w && pos.y >= tb.y && pos.y <= tb.y + tb.h) {
                game.settingsTab = tb.id;
                break;
              }
            }
          }
          const sl = game._volumeSlider;
          if (sl && pos.x >= sl.x - 10 && pos.x <= sl.x + sl.w + 10 && pos.y >= sl.y - 14 && pos.y <= sl.y + sl.h + 14) {
            const ratio = Math.max(0, Math.min(1, (pos.x - sl.x) / sl.w));
            game.audio.masterVolume = ratio;
            game._volumeDragging = true;
          } else {
            const backBtn = { x: 40, y: GAME_HEIGHT - 70, w: 120, h: 44 };
            if (pos.x >= backBtn.x && pos.x <= backBtn.x + backBtn.w && pos.y >= backBtn.y && pos.y <= backBtn.y + backBtn.h) {
              if (game.previousState === 'PAUSED') {
                game.setState('PAUSED');
              } else {
                game.setState('MENU');
              }
            }
          }
        }
      }

      function handlePointerMove(e) {
        const pos = getMousePos(e);
        if (game.state === 'MENU') {
          for (const btn of game.menuButtons) {
            btn.hovered = btn.contains(pos.x, pos.y);
          }
        }
        if (game.state === 'LEVEL_SELECT') {
          for (const btn of game.levelSelectButtons) {
            btn.hovered = pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h;
          }
          const backBtn = { x: 40, y: GAME_HEIGHT - 70, w: 120, h: 44 };
          game.levelBackButtonHovered = pos.x >= backBtn.x && pos.x <= backBtn.x + backBtn.w && pos.y >= backBtn.y && pos.y <= backBtn.y + backBtn.h;
          if (game.selectedLevelIndex >= 0) {
            const confirmBtnW = 200;
            const confirmBtnH = 52;
            const confirmBtnX = (GAME_WIDTH - confirmBtnW) / 2;
            const confirmBtnY = GAME_HEIGHT - 80;
            game.levelConfirmButtonHovered = pos.x >= confirmBtnX && pos.x <= confirmBtnX + confirmBtnW && pos.y >= confirmBtnY && pos.y <= confirmBtnY + confirmBtnH;
          } else {
            game.levelConfirmButtonHovered = false;
          }
        }
        if (game.state === 'CHARACTER_SELECT') {
          for (const btn of game.characterSelectButtons) {
            btn.hovered = pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h;
          }
          const confirmBtn = { x: (GAME_WIDTH - 200) / 2, y: GAME_HEIGHT - 90, w: 200, h: 52 };
          game.confirmButtonHovered = game.selectedCharacterIndex >= 0 && pos.x >= confirmBtn.x && pos.x <= confirmBtn.x + confirmBtn.w && pos.y >= confirmBtn.y && pos.y <= confirmBtn.y + confirmBtn.h;
        }
        if (game.state === 'PAUSED') {
          for (const btn of game.pauseMenuButtons) {
            btn.hovered = btn.contains(pos.x, pos.y);
          }
          if (game._showSaveSlotSelect) {
            game._pauseSaveSlotHovered = -1;
            for (const slot of game._pauseSaveSlotBounds) {
              if (pos.x >= slot.x && pos.x <= slot.x + slot.w && pos.y >= slot.y && pos.y <= slot.y + slot.h) {
                game._pauseSaveSlotHovered = slot.slot;
              }
            }
            const slotH2 = 160;
            const startY2 = 130;
            const cancelX2 = (GAME_WIDTH - 160) / 2;
            const cancelY2 = startY2 + slotH2 + 30;
            if (pos.x >= cancelX2 && pos.x <= cancelX2 + 160 && pos.y >= cancelY2 && pos.y <= cancelY2 + 44) {
              game._pauseSaveSlotHovered = 99;
            }
          }
        }
        if (game.state === 'SAVE_SELECT') {
          game.saveSelectBackHovered = pos.x >= 40 && pos.x <= 160 && pos.y >= GAME_HEIGHT - 70 && pos.y <= GAME_HEIGHT - 26;
          game.saveSelectDeleteHovered = -1;
          const saves = game._getAllSaves();
          for (let i = 0; i < game.saveSelectSlotBounds.length; i++) {
            const slot = game.saveSelectSlotBounds[i];
            if (saves[i]) {
              const delX = slot.x + slot.w - 80;
              const delY = slot.y + slot.h - 35;
              if (pos.x >= delX && pos.x <= delX + 60 && pos.y >= delY && pos.y <= delY + 25) {
                game.saveSelectDeleteHovered = i;
              }
            }
          }
        }
        if (game.state === 'GAME_OVER') {
          const btnW = 220, btnH = 52, btnGap = 20;
          const btnStartY = GAME_HEIGHT / 2 + 110;
          const btnX = (GAME_WIDTH - btnW) / 2;
          const retryBtn = { x: btnX, y: btnStartY, w: btnW, h: btnH };
          const menuBtn = { x: btnX, y: btnStartY + btnH + btnGap, w: btnW, h: btnH };
          if (pos.x >= retryBtn.x && pos.x <= retryBtn.x + retryBtn.w && pos.y >= retryBtn.y && pos.y <= retryBtn.y + retryBtn.h) {
            game.gameOverBtnHovered = 'retry';
          } else if (pos.x >= menuBtn.x && pos.x <= menuBtn.x + menuBtn.w && pos.y >= menuBtn.y && pos.y <= menuBtn.y + menuBtn.h) {
            game.gameOverBtnHovered = 'menu';
          } else {
            game.gameOverBtnHovered = null;
          }
        }
        if (game.state === 'ARCANA_SELECT') {
          game.arcanaHoveredIndex = -1;
          if (game.arcanaCardBounds) {
            for (let i = 0; i < game.arcanaCardBounds.length; i++) {
              const card = game.arcanaCardBounds[i];
              if (pos.x >= card.x && pos.x <= card.x + card.w && pos.y >= card.y && pos.y <= card.y + card.h) {
                game.arcanaHoveredIndex = i;
                break;
              }
            }
          }
        }
        if (game.state === 'PLAYING') {
          const bossBtn = { x: GAME_WIDTH - 160, y: 20, w: 140, h: 44 };
          game.bossButtonHovered = pos.x >= bossBtn.x && pos.x <= bossBtn.x + bossBtn.w && pos.y >= bossBtn.y && pos.y <= bossBtn.y + bossBtn.h;
          const shopBtn = { x: GAME_WIDTH - 160, y: 72, w: 140, h: 44 };
          game.shopButtonHovered = pos.x >= shopBtn.x && pos.x <= shopBtn.x + shopBtn.w && pos.y >= shopBtn.y && pos.y <= shopBtn.y + shopBtn.h;
          const diffBtn = { x: GAME_WIDTH - 160, y: 124, w: 140, h: 44 };
          game.diffButtonHovered = pos.x >= diffBtn.x && pos.x <= diffBtn.x + diffBtn.w && pos.y >= diffBtn.y && pos.y <= diffBtn.y + diffBtn.h;
          const goldBtn = { x: GAME_WIDTH - 160, y: 176, w: 140, h: 44 };
          game.goldButtonHovered = pos.x >= goldBtn.x && pos.x <= goldBtn.x + goldBtn.w && pos.y >= goldBtn.y && pos.y <= goldBtn.y + goldBtn.h;
        }
        if (game.state === 'SHOP') {
          const panelW = 960;
          const panelH = 520;
          const panelX = (GAME_WIDTH - panelW) / 2;
          const panelY = (GAME_HEIGHT - panelH) / 2;
          const merchantAreaW = 240;
          const shopAreaW = panelW - merchantAreaW - 30;
          const cols = 2;
          const itemGapX = 12;
          const itemGapY = 8;
          const itemH = 70;
          const itemW = (shopAreaW - 20 - itemGapX) / cols;
          const itemStartX = panelX + 10;
          const itemStartY = panelY + 82;
          game._shopHoveredIndex = -1;
          game._shopBuyHoveredIndex = -1;
          for (let i = 0; i < 8; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const ix = itemStartX + col * (itemW + itemGapX);
            const iy = itemStartY + row * (itemH + itemGapY);
            if (pos.x >= ix && pos.x <= ix + itemW && pos.y >= iy && pos.y <= iy + itemH) {
              game._shopHoveredIndex = i;
            }
            const buyBtnW = 70;
            const buyBtnH = 30;
            const buyBtnX = ix + itemW - buyBtnW - 8;
            const buyBtnY = iy + (itemH - buyBtnH) / 2;
            if (pos.x >= buyBtnX && pos.x <= buyBtnX + buyBtnW && pos.y >= buyBtnY && pos.y <= buyBtnY + buyBtnH) {
              game._shopBuyHoveredIndex = i;
            }
          }
          const closeBtnW = 140;
          const closeBtnH = 40;
          const closeBtnCenterX = panelX + shopAreaW / 2;
          const closeBtnY = panelY + panelH - 50;
          game._shopCloseHovered = pos.x >= closeBtnCenterX - closeBtnW / 2 && pos.x <= closeBtnCenterX + closeBtnW / 2 && pos.y >= closeBtnY && pos.y <= closeBtnY + closeBtnH;
        }
        if (game.state === 'SETTINGS') {
          if (game._volumeDragging && game._volumeSlider) {
            const sl = game._volumeSlider;
            const ratio = Math.max(0, Math.min(1, (pos.x - sl.x) / sl.w));
            game.audio.masterVolume = ratio;
          }
          game._settingsTabHovered = -1;
          if (game._settingsTabBounds) {
            for (let i = 0; i < game._settingsTabBounds.length; i++) {
              const tb = game._settingsTabBounds[i];
              if (pos.x >= tb.x && pos.x <= tb.x + tb.w && pos.y >= tb.y && pos.y <= tb.y + tb.h) {
                game._settingsTabHovered = i;
                break;
              }
            }
          }
          const backBtn = { x: 40, y: GAME_HEIGHT - 70, w: 120, h: 44 };
          game.settingsBackButtonHovered = pos.x >= backBtn.x && pos.x <= backBtn.x + backBtn.w && pos.y >= backBtn.y && pos.y <= backBtn.y + backBtn.h;
        }
      }

      window.addEventListener('keydown', (e) => {
        game.audio.unlock();
        if (game.intro.active) {
          game.intro.skip();
          return;
        }
        if (game.loading.active) {
          game.loading.skip();
          return;
        }
        if (game.state === 'VICTORY') {
          game.setState('MENU');
          return;
        }
        if (e.code === 'Escape') {
          if (game.state === 'PLAYING') game.setState('PAUSED');
          else if (game.state === 'PAUSED') {
            if (game._showSaveSlotSelect) {
              game._showSaveSlotSelect = false;
              game._pauseSaveSlotHovered = -1;
            } else {
              game.setState('PLAYING');
            }
          }
          else if (game.state === 'SHOP') game.setState('PLAYING');
          else if (game.state === 'ARCANA_SELECT') game.state = 'PLAYING';
          else if (game.state === 'SAVE_SELECT') game.setState('MENU');
        }
      });
      canvas.addEventListener('mousedown', (e) => {
        game.audio.unlock();
        handlePointerDown(e);
      });
      canvas.addEventListener('mousemove', handlePointerMove);
      canvas.addEventListener('mouseup', () => {
        game._volumeDragging = false;
      });
      canvas.addEventListener('touchstart', (e) => {
        game.audio.unlock();
        const t = e.touches[0];
        handlePointerDown(t);
      }, { passive: true });

    })();
  </script>
</body>
</html>
